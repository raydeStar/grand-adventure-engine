  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  #  STARTER LORE â€” Auto-granted on character creation
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-mechanics-combat"
    name: "Combat Basics"
    lore_scope: "mechanic"
    is_starter_lore: true
    cascade_down: false
    discovery_trigger: "auto"
    description: "How fighting works in this world."
    content: >
      Combat in Elarion is turn-based and brutal. When hostilities begin, you and your
      opponent trade blows in sequence. Your STR governs melee damage, DEX determines
      hit chance and dodge, and CON is the difference between walking away and being
      carried out. Spellcasters draw from MP to unleash magical attacks â€” INT boosts
      spell power while WIS improves spell accuracy. LUCK influences critical hits
      and loot drops. Don't forget: running away is always an option. The dead have
      no pride to protect.
    narrator_hint: "Reference combat mechanics naturally when the player first enters a fight or asks about fighting."
    tags: ["tutorial", "combat", "starter"]

  - id: "lore-mechanics-stats"
    name: "Attributes & Stats"
    lore_scope: "mechanic"
    is_starter_lore: true
    cascade_down: false
    discovery_trigger: "auto"
    description: "The seven attributes that define every adventurer."
    content: >
      Seven attributes shape your fate: STR (raw power), DEX (agility and finesse),
      CON (toughness and endurance), INT (arcane knowledge), WIS (perception and willpower),
      CHA (force of personality), and LUCK (the universe's opinion of you).
      Each attribute provides a modifier: (stat - 10) / 2, rounded down.
      Equipment can boost these further. A silver tongue (high CHA) opens doors
      that a sharp sword cannot â€” and vice versa.
    narrator_hint: "Explain stat mechanics when the player checks their stats for the first time or asks about attributes."
    tags: ["tutorial", "stats", "starter"]

  - id: "lore-mechanics-magic"
    name: "Magic & Spellcasting"
    lore_scope: "mechanic"
    is_starter_lore: true
    cascade_down: false
    discovery_trigger: "auto"
    description: "How the arcane arts function in Elarion."
    content: >
      Magic flows through the Aether â€” an invisible energy that permeates Elarion.
      Spellcasters channel Aether through learned formulae (registered spells) or raw
      willpower (improvised spells). Registered spells are reliable and cost fixed MP.
      Improvised spells are creative but risky â€” exceed your power cap and the spell
      fizzles spectacularly. Your class determines your spell cap and which registered
      spells you can learn. Even non-casters can attempt minor cantrips, though the
      results tend to be... entertaining.
    narrator_hint: "Weave Aether lore into magic-related narration. The Aether is visible in certain areas as a faint shimmer."
    tags: ["tutorial", "magic", "aether", "starter"]

  - id: "lore-mechanics-equipment"
    name: "Equipment & Inventory"
    lore_scope: "mechanic"
    is_starter_lore: true
    cascade_down: false
    discovery_trigger: "auto"
    description: "Weapons, armor, and the things you carry."
    content: >
      You can equip items in ten slots: Weapon, Armor, Shield, Helmet, Cloak, Boots,
      Gloves, Ring, Amulet, and Bracelet. Each piece may grant stat bonuses or special
      effects. Weapons have damage dice (like 1d8+2), and armor provides a flat defense
      bonus. Two-handed weapons sacrifice your shield slot for extra damage. Consumables
      like potions can be used in or out of combat. Shops sell gear for gold â€” the
      universal currency. If you can't afford it, there's always the old-fashioned
      way: take it off something that doesn't need it anymore.
    narrator_hint: "Reference equipment naturally when the player finds loot, visits a shop, or asks about gear."
    tags: ["tutorial", "equipment", "starter"]

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  #  PLANET-LEVEL LORE â€” Root of the hierarchy
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-elarion"
    name: "Elarion"
    lore_scope: "planet"
    is_starter_lore: true
    cascade_down: false
    discovery_trigger: "auto"
    description: "The world of Elarion â€” a land of crystal, conflict, and ancient powers."
    content: >
      Elarion is a world where magic flows through an energy called the Aether, where
      ancient beings called the Veiled Architects once shaped the course of history from their
      hidden realm, and where empires rise and fall like desert tides. The great city
      of Stonewake sits at the crossroads of trade and conflict â€” a jewel of the
      desert kingdom of Valeward, now under the shadow of Imperial occupation.
      Eidolons â€” beings of immense power â€” slumber in forgotten places, and the
      aetherglass crystals that once powered civilizations now threaten to destroy them.
      Adventures begin in taverns. Yours begins at The Lantern's Rest.
    narrator_hint: "Elarion is the backdrop for everything. Reference the Aether, the political tension, and the ancient mysteries when setting atmosphere."
    tags: ["world", "elarion", "starter"]

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  #  REGION: VALEWARD
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-valeward"
    name: "The Kingdom of Valeward"
    lore_scope: "region"
    parent_lore_id: "lore-elarion"
    is_starter_lore: false
    cascade_down: false
    discovery_trigger: "talk"
    description: "A desert kingdom under Imperial occupation."
    content: >
      Valeward was once a proud, independent kingdom ruled by the Valewarden royal line.
      Two years ago, the Veyr Empire invaded under the pretense of a peace treaty.
      King Arvend was assassinated, the princess vanished, and Valeward became a
      conquered province. Now Imperial soldiers patrol the streets, taxes bleed the
      merchants dry, and the people endure with quiet defiance. But whispers of
      resistance grow louder in the back alleys, and not everyone has accepted
      the Empire's rule.
    teaser: "A desert kingdom with a troubled recent history..."
    narrator_hint: "The Imperial occupation is the central political conflict. NPCs have strong opinions about it."
    linked_entity_ids: ["stonewake"]
    tags: ["region", "valeward", "politics", "empire"]

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  #  CITY: STONEWAKE
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-stonewake"
    name: "Stonewake"
    lore_scope: "city"
    parent_lore_id: "lore-valeward"
    cascade_down: false
    discovery_trigger: "explore"
    discovery_source_id: "spawn"
    description: "The great desert city, jewel of Valeward."
    content: >
      Stonewake is a sprawling desert metropolis of sandstone archways, grand bazaars,
      and narrow back alleys. The city is divided between the sunlit upper districts where
      Imperial officers and wealthy merchants reside, and the lower quarters where the
      common folk scrape by. The Oldwater Tunnels runs beneath everything â€” an
      ancient sewer system that now serves as both a trade route for smugglers and a
      highway for monsters. The city's beating heart is the town square, where news,
      gossip, and gold flow freely.
    teaser: "A great desert city you've heard stories about..."
    narrator_hint: "Stonewake is bustling, hot, and full of contrasts â€” wealth next to poverty, Imperial order next to underground chaos."
    linked_entity_ids: ["spawn", "town_square", "back_alley"]
    tags: ["city", "stonewake", "valeward", "desert"]

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  #  LOCATIONS IN STONEWAKE
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-lanterns-rest"
    name: "The Lantern's Rest"
    lore_scope: "location"
    parent_lore_id: "lore-stonewake"
    cascade_down: false
    discovery_trigger: "explore"
    discovery_source_id: "spawn"
    description: "A bustling tavern run by a former resistance fighter."
    content: >
      The Lantern's Rest is more than just a tavern â€” it's a sanctuary. Run by Mara
      Vale, a former member of the resistance group Ashen Vow, the bar serves as an
      unofficial meeting point for those who oppose Imperial rule. The drinks are strong,
      the food is surprisingly good, and if you know the right words, you can access
      information networks that reach across all of Valeward. A faded Ashen Vow poster
      hangs behind the bar, half-hidden by bottles â€” a reminder of fights past and
      perhaps fights yet to come.
    teaser: "A tavern where the drinks come with a side of secrets..."
    narrator_hint: "The Lantern's Rest feels warm and safe despite the world outside. Mara's presence makes it a hub of quiet resistance."
    linked_entity_ids: ["spawn", "innkeeper_mara"]
    tags: ["location", "tavern", "lanterns-rest", "ashen_vow"]

  - id: "lore-oldwater"
    name: "The Oldwater Tunnels"
    lore_scope: "location"
    parent_lore_id: "lore-stonewake"
    cascade_down: false
    discovery_trigger: "explore"
    discovery_source_id: "tavern_cellar"
    description: "Ancient sewers beneath Stonewake, now a monster-infested smuggler highway."
    content: >
      The Oldwater Tunnels is an ancient system of canals and tunnels beneath
      Stonewake, originally built to manage floodwaters from the Estersand. Over the
      centuries it became a smuggler's route, a hiding place for fugitives, and eventually
      a breeding ground for monsters. Giant rats, slimes, and worse things lurk in the
      dark. The Resistance uses certain passages for covert movement, though they're
      careful â€” the deeper sections are truly dangerous. Strange markings on the oldest
      walls suggest the waterway predates Stonewake itself.
    teaser: "Dark tunnels beneath the city where things lurk..."
    narrator_hint: "The waterway is claustrophobic, damp, and echoing. Light sources flicker. Something is always watching."
    linked_entity_ids: ["tavern_cellar"]
    tags: ["location", "dungeon", "waterway", "underground"]

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  #  FACTIONS
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-valewarden-resistance"
    name: "The Valewarden Resistance"
    lore_scope: "faction"
    parent_lore_id: "lore-valeward"
    cascade_down: false
    discovery_trigger: "talk"
    discovery_source_id: "innkeeper_mara"
    description: "Freedom fighters loyal to the memory of King Arvend."
    content: >
      The Valewarden Resistance is a loosely organized network of freedom fighters,
      spies, smugglers, and ordinary citizens united by one goal: liberating Valeward
      from Imperial rule. They operate in cells â€” small groups that know only their
      immediate contacts â€” to prevent the Empire from rolling up the entire network
      if one member is captured. Mara Vale's Lantern's Rest serves as an unofficial
      headquarters. The Resistance lacks the military power to challenge the Empire
      directly, so they rely on sabotage, intelligence gathering, and building alliances
      with sympathetic factions. Rumors say they're searching for something that could
      turn the tide â€” an ancient power hidden beneath the desert.
    teaser: "Whispers of organized resistance against the Empire..."
    narrator_hint: "The Resistance is real but cautious. NPCs won't openly discuss it unless they trust the player."
    linked_entity_ids: ["innkeeper_mara", "drunk_pete"]
    tags: ["faction", "resistance", "valeward", "ashen_vow"]

  - id: "lore-veiled_architects-cult"
    name: "The Cult of the Veiled Architects"
    lore_scope: "faction"
    parent_lore_id: "lore-elarion"
    cascade_down: false
    discovery_trigger: "talk"
    description: "Zealots who worship the ancient Veiled Architects as gods."
    content: >
      The Cult of the Veiled Architects is a fanatical religious order that believes the Veiled Architects â€”
      ancient, godlike beings who once shaped Elarion's history â€” are the true rulers
      of the world and must be served absolutely. They seek to awaken the Eidolon sealed
      within the Blackspire at Stormreach, believing this will herald the Veiled Architects' return.
      Their members are found throughout Elarion, often disguised as scholars, merchants,
      or even Imperial officers. They are willing to kill, manipulate, and sacrifice
      anything in service of their divine masters. Most people dismiss them as lunatics.
      Those who've seen their work up close know better.
    teaser: "A strange religious order with dangerous beliefs..."
    narrator_hint: "The Cult operates in the shadows. Their members seem normal until they don't. Creepy undertones."
    tags: ["faction", "cult", "veiled_architects", "antagonist"]

  - id: "lore-merchants-guild"
    name: "Stonewake Merchants' Guild"
    lore_scope: "faction"
    parent_lore_id: "lore-stonewake"
    cascade_down: false
    discovery_trigger: "talk"
    description: "The shopkeepers and traders who keep Stonewake's economy alive."
    content: >
      The Merchants' Guild is the economic backbone of Stonewake. Run by a council
      of the city's wealthiest traders, they control prices, regulate trade routes,
      and maintain the Grand Bazaar. They're officially neutral in the conflict between
      the Empire and the Resistance, but in practice they'll do business with anyone
      who has gold. Several Sprigs hold senior positions â€” their natural affinity for
      commerce and bookkeeping makes them invaluable. The Guild's motto: "gold doesn't
      care whose pocket it came from." They charge membership fees, offer bulk discounts,
      and occasionally hire adventurers for caravan escort work.
    teaser: "A powerful trading organization in the city..."
    narrator_hint: "The Guild is pragmatic and mercenary. They respect wealth and shrewd dealing above all."
    linked_entity_ids: ["merchants_guild"]
    tags: ["faction", "merchants", "trade", "sprig"]

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  #  NPCs
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-mara"
    name: "Mara Vale"
    lore_scope: "npc"
    parent_lore_id: "lore-valewarden-resistance"
    cascade_down: false
    discovery_trigger: "talk"
    discovery_source_id: "innkeeper_mara"
    description: "Bartender, martial artist, and former Ashen Vow operative."
    content: >
      Mara Vale runs The Lantern's Rest with warmth, precision, and fists that
      could crack sandstone. A former member of the old resistance cell Ashen Vow,
      she came to Stonewake after that chapter of her life ended â€” though she doesn't
      talk about why. She carries a complicated history with a wandering swordmaster
      and a grief she keeps locked behind her smile. As a bartender, she's everyone's
      confidant. As a fighter, she's terrifying â€” her Ironheart gloves sit behind
      the counter, always within reach. She feeds intelligence to the Valewarden
      Resistance but isn't officially a member. Her tavern is neutral ground, and
      she enforces that with extreme prejudice.
    teaser: "The bartender at The Lantern's Rest â€” seems like more than she lets on..."
    narrator_hint: "Mara is warm but guarded about her past. High CHA unlocks more personal details. She's observant and notices everything."
    linked_entity_ids: ["innkeeper_mara", "spawn"]
    tags: ["npc", "mara", "ashen_vow", "bartender", "martial-artist"]

  - id: "lore-perrin"
    name: "Perrin"
    lore_scope: "npc"
    parent_lore_id: "lore-valewarden-resistance"
    cascade_down: false
    discovery_trigger: "talk"
    discovery_source_id: "drunk_pete"
    description: "A perpetually drunk resistance member waiting for his partner Hale to return."
    content: >
      Perrin is one half of the legendary duo Hale & Perrin â€” except Hale shipped
      out on a mission weeks ago and hasn't come back. Since then, Perrin has been
      drowning his worry (and his sorrows) at The Lantern's Rest's bar. He's hapless,
      good-hearted, and terrible at keeping secrets, which is why the Resistance only
      gives him low-level assignments. He claims he once piloted an airship â€” a story
      that changes slightly every time he tells it. Despite his bumbling exterior,
      Perrin is surprisingly loyal and brave when it matters. He just needs someone
      to believe in him.
    teaser: "A drunk regular at the tavern â€” seems to know people..."
    narrator_hint: "Perrin is comic relief but has genuine heart. He accidentally drops hints about Resistance activities when drunk."
    linked_entity_ids: ["drunk_pete", "spawn"]
    tags: ["npc", "perrin", "hale", "comic-relief", "resistance"]

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  #  REGION: GLOAMWOOD
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-gloamwood"
    name: "The Gloamwood"
    lore_scope: "region"
    parent_lore_id: "lore-elarion"
    cascade_down: false
    discovery_trigger: "explore"
    description: "A vast primordial jungle of ancient magic and forgotten peoples."
    content: >
      The Gloamwood is a trackless expanse of ancient trees, bioluminescent fungi,
      and predatory wildlife. The Sylvar â€” a reclusive race of tall, rabbit-eared warriors
      â€” once called it home, though most have retreated deeper into the forest or left
      entirely. The jungle is saturated with Aether, making magic unpredictable and powerful
      within its borders. Ancient ruins dot the undergrowth, remnants of a civilization
      that predated even the Veiled Architects. Travelers who enter without a guide rarely return.
      Those who do return speak of whispers in the canopy and lights that move with purpose.
    teaser: "A dark jungle to the south that few return from..."
    narrator_hint: "The jungle is alive and aware. Nature here has opinions. The Aether makes everything slightly surreal."
    linked_entity_ids: ["gloamwood"]
    tags: ["region", "jungle", "sylvar", "aether", "dangerous"]

  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
  #  REGIONS: BLACKSPIRE AT STORMREACH
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-blackspire"
    name: "The Blackspire at Stormreach"
    lore_scope: "region"
    parent_lore_id: "lore-elarion"
    cascade_down: false
    discovery_trigger: "talk"
    description: "A black tower rising from the sea, prison of an ancient Eidolon."
    content: >
      The Blackspire at Stormreach is a monolithic tower of black stone that rises from
      the ocean south of Elarion. Built by the Veiled Architects in an age before recorded
      history, it serves as both a beacon and a prison â€” within its highest chamber
      sleeps an Eidolon of devastating power, sealed away because even the Veiled Architects
      feared what it could do. The tower is filled with traps, guardians, and puzzles
      designed to prevent anyone from reaching the summit. The Cult of the Veiled Architects
      believes awakening this Eidolon will herald a new age. The Resistance believes
      it could be weaponized against the Empire. Everyone agrees: it's extremely dangerous.
    teaser: "A mysterious black tower visible on the distant horizon..."
    narrator_hint: "The Blackspire is endgame content. Build dread and mystery when it's mentioned. No one who's gone inside has come back the same."
    linked_entity_ids: ["blackspire"]
    tags: ["region", "blackspire", "tower", "eidolon", "endgame", "veiled_architects"]

