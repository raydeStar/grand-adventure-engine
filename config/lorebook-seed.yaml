  #  HISTORY & EVENTS
  # â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

  - id: "lore-fall-of-valeward"
    name: "The Fall of Valeward"
    lore_scope: "event"
    parent_lore_id: "lore-valeward"
    cascade_down: false
    discovery_trigger: "talk"
    description: "The night the Empire took Valeward and King Arvend was murdered."
    content: >
      Two years ago, the Veyr Empire extended an offer of peace to King Arvend
      of Valeward. The king traveled to Northgate Keep for the signing ceremony.
      He never returned. The official Imperial account claims Valewarden traitors
      assassinated the king to provoke war. The truth, whispered in back alleys:
      the Empire orchestrated the assassination and used the chaos to justify a full
      military occupation. Princess Seris, heir to the throne, was reported dead â€”
      but no body was ever found. The Resistance clings to the hope that she lives.
      The anniversary of the Fall is a day of mourning in Stonewake, observed in
      silence under the watchful eyes of Imperial soldiers.
    teaser: "Something terrible happened to this kingdom not long ago..."
    narrator_hint: "The Fall is recent history and deeply emotional for Valewardens. NPCs react strongly when it's mentioned."
    tags: ["event", "history", "valeward", "empire", "assassination"]

  - id: "lore-aether"
    name: "The Aether"
    lore_scope: "history"
    parent_lore_id: "lore-elarion"
    cascade_down: false
    discovery_trigger: "talk"
    description: "The invisible magical energy that permeates all of Elarion."
    content: >
      The Aether is the lifeblood of magic in Elarion. It flows through the air like
      an invisible current, concentrating in certain areas â€” jungles, ruins, and
      places where the earth is thin. Spellcasters draw upon the Aether to fuel their
      magic, and Aether-dense areas amplify magical effects (sometimes dangerously).
      Aetherglass â€” a rare crystal â€” can absorb and store Aether, making it incredibly
      valuable and incredibly dangerous. The ancient Veiled Architects crafted aetherglass as tools
      of control. The Empire now seeks it as a weapon. In high concentrations, Aether
      can warp reality: animals grow monstrous, the dead stir, and the boundaries
      between worlds grow thin.
    teaser: "A strange energy that seems to power magic in this world..."
    narrator_hint: "The Aether is everywhere but invisible to most. Describe it as a shimmer, a tingling, or a pressure in the air when it's relevant."
    tags: ["history", "aether", "magic", "aetherglass", "veiled_architects"]

  - id: "lore-veiled_architects"
    name: "The Veiled Architects"
    lore_scope: "history"
    parent_lore_id: "lore-elarion"
    cascade_down: false
    discovery_trigger: "quest"
    description: "Ancient godlike beings who once shaped the destiny of Elarion."
    content: >
      The Veiled Architects are ancient, incorporeal beings who existed before mortal races
      walked Elarion. They shaped history from the shadows â€” creating the Eidolons
      as servants, crafting aetherglass to control the flow of Aether, and manipulating
      mortal rulers as puppets. When a mortal dared defy them, the Veiled Architects sealed
      their most powerful Eidolon in the Blackspire and withdrew from the world. Or so
      the stories say. Some scholars believe the Veiled Architects never truly left â€” that
      they still whisper in the ears of the powerful, nudging history toward their
      unknowable ends. The Cult worships them. The wise fear them.
    teaser: "Legends speak of ancient beings who shaped the world..."
    narrator_hint: "The Veiled Architects should feel Lovecraftian â€” vast, alien, and beyond mortal comprehension. They are not benevolent."
    tags: ["history", "veiled_architects", "gods", "ancient", "eidolon", "deep-lore"]

  - id: "lore-eidolons"
    name: "The Eidolons"
    lore_scope: "history"
    parent_lore_id: "lore-veiled_architects"
    cascade_down: false
    discovery_trigger: "quest"
    description: "Powerful beings created by the Veiled Architects, now sealed across Elarion."
    content: >
      Eidolons are beings of immense magical power, created by the Veiled Architects as servants
      and weapons. When the Eidolons rebelled â€” seeking freedom from their creators â€”
      the Veiled Architects crushed them and sealed each one in a prison of stone and magic.
      These prisons are scattered across Elarion: in forgotten ruins, deep caverns,
      and the depths of the Blackspire. An Eidolon can be freed by a mortal of sufficient
      power and will, binding the Eidolon to their service. This is the foundation
      of summoning magic. But the most powerful Eidolon â€” the one sealed in the Blackspire â€”
      has never been freed. There's a reason for that.
    teaser: "Ancient creatures of incredible power, locked away for centuries..."
    narrator_hint: "Eidolons are endgame mysteries. Build intrigue and dread. Each one has a tragic backstory."
    tags: ["history", "eidolons", "summoning", "veiled_architects", "power"]

