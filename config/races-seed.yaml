# ══════════════════════════════════════════════════════════════════
# FINAL FANTASY-THEMED RACE REGISTRY
# "The world is home to many peoples. All of them argue." — Matoya
# ══════════════════════════════════════════════════════════════════

races:

  - id: human
    name: Hume
    description: "The most common race in Ivalice. Adaptable, ambitious, and endlessly resourceful. What Humes lack in natural talent they make up for with sheer determination."
    stat_bonuses:
      str: 1
      dex: 1
      con: 1
    traits: [Versatile, Ambitious, Adaptive]
    allowed_classes: []
    tags: [common, adaptable]

  - id: elf
    name: Viera
    description: "Tall, graceful forest-dwellers with long ears and keen senses. Viera are reclusive by nature, but those who leave the Wood become some of the deadliest warriors in the realm."
    stat_bonuses:
      dex: 2
      int: 1
    traits: [Keen Senses, Wood Affinity, Heightened Reflexes, Long-lived]
    allowed_classes: []
    tags: [forest, graceful, magical]

  - id: dwarf
    name: Bangaa
    description: "Tough, reptilian warriors who value martial prowess above all else. Bangaa are renowned smiths and soldiers — blunt, proud, and incredibly strong."
    stat_bonuses:
      con: 2
      str: 1
    traits: [Armored Hide, Warrior Culture, Resilient]
    allowed_classes: []
    tags: [sturdy, reptilian, resilient]

  - id: halfling
    name: Moogle
    description: "Small, fluffy creatures with bat-like wings and a red pom-pom antenna. Moogles are lucky, brave, and surprisingly fierce. They say 'kupo' at the end of sentences and nobody knows why."
    stat_bonuses:
      dex: 2
      luck: 2
    traits: [Lucky, Brave, Flight, Moogle Charm]
    allowed_classes: []
    tags: [small, lucky, brave, moogle]

  - id: orc
    name: Ronso
    description: "Powerful leonine warriors from the frozen mountains. Ronso channel their rage into devastating combat techniques and respect strength above all else."
    stat_bonuses:
      str: 3
      con: 1
    traits: [Mighty Roar, Savage Attacks, Mountain Born]
    allowed_classes: []
    tags: [fierce, strong, tribal]

  - id: tiefling
    name: Nu Mou
    description: "Ancient, hunched creatures with long ears and a deep affinity for magic. Nu Mou are scholars, sages, and spellcasters — quiet, wise, and perpetually misunderstood."
    stat_bonuses:
      cha: 2
      int: 1
    traits: [Arcane Heritage, Magical Resistance, Ancient Knowledge]
    allowed_classes: []
    tags: [magical, scholarly, wise]

  - id: gnome
    name: Lalafell
    description: "Tiny, adorable people with oversized heads and an even bigger appetite for commerce and knowledge. Don't let the cute face fool you — Lalafell are ruthlessly clever."
    stat_bonuses:
      int: 2
      dex: 1
    traits: [Cunning, Merchant Instinct, Quick Wits]
    allowed_classes: []
    tags: [small, clever, inventive]

  - id: dragonborn
    name: Gria
    description: "Winged dragon-kin with scales, horns, and the ability to take flight. Gria are proud warriors who carry draconic fire in their blood."
    stat_bonuses:
      str: 2
      cha: 1
    traits: [Dragon Wings, Draconic Resistance, Breath Weapon]
    allowed_classes: []
    tags: [draconic, proud, powerful, flight]

  - id: fairy
    name: Pixie
    description: "Tiny winged fey brimming with mischief and Mist-infused magic. What they lack in size they compensate for with sheer chaotic energy."
    stat_bonuses:
      cha: 2
      dex: 1
    traits: [Flight, Fairy Magic, Mist Affinity, Tiny]
    allowed_classes: []
    tags: [fey, tiny, magical, flight]
