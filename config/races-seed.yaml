# ============================================================
# Grand Adventure Engine - Race Registry Seed
# ============================================================

races:

  - id: human
    name: Human
    description: "Versatile and ambitious, humans are the most adaptable of all races. They excel at nothing in particular but have no weaknesses."
    stat_bonuses:
      str: 1
      dex: 1
      con: 1
    traits: [Versatile, Ambitious, Adaptive]
    allowed_classes: []
    tags: [common, adaptable]

  - id: elf
    name: Elf
    description: "Graceful and long-lived, elves possess keen senses and a natural affinity for magic. They move through the world with an effortless elegance."
    stat_bonuses:
      dex: 2
      int: 1
    traits: [Darkvision, Fey Ancestry, Keen Senses, Trance]
    allowed_classes: []
    tags: [fey, graceful, magical]

  - id: dwarf
    name: Dwarf
    description: "Stout, tough, and unyielding. Dwarves are born of stone and stubborn as the mountains they call home. They hold grudges the way others hold swords."
    stat_bonuses:
      con: 2
      str: 1
    traits: [Darkvision, Dwarven Resilience, Stonecunning]
    allowed_classes: []
    tags: [sturdy, mountain, resilient]

  - id: halfling
    name: Halfling
    description: "Small in stature but enormous in heart. Halflings are nimble, lucky, and fundamentally incapable of being serious when the situation demands it."
    stat_bonuses:
      dex: 2
      luck: 2
    traits: [Lucky, Brave, Nimble]
    allowed_classes: []
    tags: [small, lucky, brave]

  - id: orc
    name: Orc
    description: "Powerful and fierce, orcs channel their rage into devastating combat prowess. They respect strength above all else."
    stat_bonuses:
      str: 3
      con: 1
    traits: [Relentless Endurance, Savage Attacks, Darkvision]
    allowed_classes: []
    tags: [fierce, strong, tribal]

  - id: tiefling
    name: Tiefling
    description: "Touched by infernal heritage, tieflings bear the marks of their fiendish ancestry. They are charming, clever, and perpetually mistrusted."
    stat_bonuses:
      cha: 2
      int: 1
    traits: [Darkvision, Hellish Resistance, Infernal Legacy]
    allowed_classes: []
    tags: [infernal, charismatic, outcast]

  - id: gnome
    name: Gnome
    description: "Curious and inventive, gnomes are tinkerers and scholars with an insatiable appetite for knowledge and an unfortunate tendency to explode things."
    stat_bonuses:
      int: 2
      dex: 1
    traits: [Darkvision, Gnome Cunning, Tinker]
    allowed_classes: []
    tags: [small, clever, inventive]

  - id: dragonborn
    name: Dragonborn
    description: "Proud descendants of dragons, dragonborn carry the power of their draconic heritage in their blood. They breathe fire and command respect."
    stat_bonuses:
      str: 2
      cha: 1
    traits: [Breath Weapon, Draconic Resistance, Draconic Heritage]
    allowed_classes: []
    tags: [draconic, proud, powerful]

  - id: fairy
    name: Fairy
    description: "Tiny winged fey creatures brimming with mischief and magic. What they lack in size they make up for in sheer unpredictability."
    stat_bonuses:
      cha: 2
      dex: 1
    traits: [Flight, Fairy Magic, Fey Ancestry, Tiny]
    allowed_classes: []
    tags: [fey, tiny, magical, flight]
