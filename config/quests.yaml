# ══════════════════════════════════════════════════════════════════
# FINAL FANTASY-THEMED QUEST SEED
# "Your next objective is always one more fight away." — Cid
# ══════════════════════════════════════════════════════════════════

quests:
  # ── QUEST 1: Lebreau's Rat Problem ──────────────────────────
  - id: "waterway_infestation"
    name: "The Waterway Infestation"
    description: "Lebreau's cellar connects to the Garamsythe Waterway, and something down there is scaring away her barbacks. Clear it out."
    giver_id: "innkeeper_mara"
    turn_in_npc_id: "innkeeper_mara"
    min_level: 1
    is_one_time: true
    tags: ["side", "combat", "beginner"]
    stages:
      - id: "kill_rats"
        name: "Clear the Waterway"
        description: "Descend into the Garamsythe Waterway and deal with the infestation."
        narrator_hint: "The player is hunting dire rats mutated by Mist energy in the waterway beneath the Seventh Heaven. Make it visceral — bioluminescent fungus, dripping pipes, bloated rats with glowing blue teeth."
        objectives:
          - id: "kill_giant_rat"
            type: Kill
            target_id: "giant_rat"
            required_count: 1
            description: "Kill the Dire Rat in the Waterway"
        next_stage_id: "return_to_lebreau"
      - id: "return_to_lebreau"
        name: "Report Back"
        description: "Tell Lebreau the Waterway is clear."
        narrator_hint: "Lebreau is relieved and pours the player a drink on the house. She hints this wasn't the first pest problem — the Mist beneath the city is getting worse."
        objectives:
          - id: "talk_lebreau_done"
            type: TalkTo
            target_id: "innkeeper_mara"
            description: "Report back to Lebreau"
    rewards:
      xp: 25
      gold: 10
      disposition_shift: 10
      memory_flags: ["helped-with-rats"]

  # ── QUEST 2: Wedge's Lucky Charm ─────────────────────────
  - id: "wedge_lucky_charm"
    name: "Wedge's Lucky Charm"
    description: "Wedge lost his lucky bottle somewhere in Lowtown during a bender. Biggs gave it to him before shipping out. It's the only thing keeping Wedge sane."
    giver_id: "drunk_pete"
    turn_in_npc_id: "drunk_pete"
    min_level: 1
    is_one_time: true
    tags: ["side", "fetch", "beginner"]
    stages:
      - id: "find_bottle"
        name: "Search Lowtown"
        description: "Look for Wedge's lucky bottle somewhere in Lowtown."
        narrator_hint: "Wedge is vague about where he lost it because he was blackout drunk. The player finds an empty potion bottle in Lowtown — Wedge insists it's his lucky charm from Biggs and is pathetically grateful."
        objectives:
          - id: "collect_bottle"
            type: Collect
            target_id: "discarded_bottle"
            required_count: 1
            description: "Find Wedge's lucky bottle in Lowtown"
        next_stage_id: "return_to_wedge"
      - id: "return_to_wedge"
        name: "Return to Wedge"
        description: "Bring the bottle back to Wedge."
        narrator_hint: "Wedge tears up. He'll tell the player a rumor about the Pharos as thanks — something about the cultists smuggling supplies from the bazaar."
        objectives:
          - id: "deliver_to_wedge"
            type: Deliver
            target_id: "drunk_pete"
            required_count: 1
            description: "Deliver the bottle to Wedge"
    rewards:
      xp: 15
      gold: 5
      disposition_shift: 15
      memory_flags: ["helped-wedge"]

  # ── QUEST 3: Basch's Patrol ─────────────────────────────
  - id: "patrol_resistance"
    name: "Eyes on the Empire"
    description: "Basch — 'the gate guard' — wants someone to scout Rabanastre's perimeter and report Imperial troop movements."
    giver_id: "guard_bram"
    turn_in_npc_id: "guard_bram"
    min_level: 1
    is_one_time: true
    tags: ["side", "exploration", "beginner"]
    stages:
      - id: "scout_locations"
        name: "Scout the Perimeter"
        description: "Visit key locations around Rabanastre to check for Imperial activity."
        narrator_hint: "The player is doing reconnaissance for Basch. Each location should feel like a recon sweep — note any suspicious Imperial presences, supply movements, or resistance sympathizers."
        objectives:
          - id: "visit_gate"
            type: Discover
            target_id: "town_gate"
            description: "Check the eastern gate"
          - id: "visit_alley"
            type: Discover
            target_id: "back_alley"
            description: "Sweep Lowtown"
          - id: "visit_market"
            type: Discover
            target_id: "market_stalls"
            description: "Check the Moogle Market"
        next_stage_id: "report_basch"
      - id: "report_basch"
        name: "Report to Basch"
        description: "Report your findings to the 'gate guard.'"
        narrator_hint: "Basch nods with quiet approval. For a moment, the legendary captain shows through the common guard's mask. He hints at the resistance's existence without saying more."
        objectives:
          - id: "talk_basch_done"
            type: TalkTo
            target_id: "guard_bram"
            description: "Report back to Basch"
    rewards:
      xp: 30
      gold: 15
      disposition_shift: 10
      memory_flags: ["resistance-contact"]

  # ── QUEST 4: Watts' Masterwork ────────────────────────────
  - id: "watts_masterwork"
    name: "Watts' Masterwork"
    description: "Watts doesn't sell his best mythril to just anyone. Prove you're worthy and he'll forge something special."
    giver_id: "blacksmith_korga"
    turn_in_npc_id: "blacksmith_korga"
    min_level: 1
    prerequisites: ["waterway_infestation"]
    is_one_time: true
    tags: ["side", "combat", "custom"]
    stages:
      - id: "prove_yourself"
        name: "Earn Watts' Respect"
        description: "Show the Bangaa smith you know your way around a blade."
        narrator_hint: "Watts is testing the player's mettle. He respects combat stories that ring true and practical knowledge of steel and tactics. Empty boasting earns nothing."
        objectives:
          - id: "impress_watts"
            type: Custom
            custom_condition: "The player has demonstrated combat prowess or told a convincing war story to Watts during conversation. Bragging without substance should not count."
            description: "Impress Watts with your fighting spirit"
        next_stage_id: "claim_reward"
      - id: "claim_reward"
        name: "Claim Your Prize"
        description: "Talk to Watts to receive the weapon he's forged."
        narrator_hint: "Watts gives a rare grin — all fangs and approval. He reaches under the counter and produces a blade he's been saving. 'This one's earned, not bought.'"
        objectives:
          - id: "talk_watts_reward"
            type: TalkTo
            target_id: "blacksmith_korga"
            description: "Speak with Watts to claim your reward"
    rewards:
      xp: 40
      gold: 0
      items:
        - item_id: "iron_sword"
          quantity: 1
      disposition_shift: 15
      memory_flags: ["watts-approved"]

  # ── QUEST 5: Fran's Missing Kin ──────────────────────────
  - id: "fran_missing_kin"
    name: "Into the Golmore"
    description: "Fran's younger sister Mjrn ventured into the Golmore Jungle and hasn't returned. The Viera won't ask for help — but she'll accept it."
    giver_id: "gate_guard_lena"
    turn_in_npc_id: "gate_guard_lena"
    min_level: 1
    is_one_time: true
    tags: ["main", "exploration", "story"]
    stages:
      - id: "enter_forest"
        name: "Search the Golmore"
        description: "Enter the Golmore Jungle and look for signs of Mjrn."
        narrator_hint: "The player is searching for a missing Viera in the jungle. The atmosphere should be thick with Mist and foreboding. The jungle feels alive and watchful. Build tension — something drove Mjrn deeper."
        objectives:
          - id: "reach_forest"
            type: Discover
            target_id: "forest_edge"
            description: "Enter the Golmore Jungle"
    rewards:
      xp: 50
      gold: 20
      disposition_shift: 20
      memory_flags: ["fran-trusted", "!golmore-explorer"]

  # ── QUEST 6: Crystal Blessing ────────────────────────────
  - id: "crystal_blessing"
    name: "The Crystal's Favor"
    description: "Minwu senses the Crystals crying out. He wants to bless a worthy adventurer before the darkness deepens."
    giver_id: "priest_aldric"
    turn_in_npc_id: "priest_aldric"
    min_level: 1
    is_one_time: true
    tags: ["side", "story", "custom"]
    stages:
      - id: "seek_blessing"
        name: "Receive the Blessing"
        description: "Speak with Minwu about the Crystals' warning."
        narrator_hint: "Minwu is earnest and slightly unhinged. He genuinely believes the Crystals speak to him and that the player is a Warrior of Light. The blessing ceremony should feel real and weighty — crystal light, warmth, a moment of genuine hope despite Minwu's eccentricities."
        objectives:
          - id: "listen_minwu"
            type: Custom
            custom_condition: "The player has listened to Minwu's concerns about the Crystal and accepted his offer of a blessing during conversation. Simply asking about healing costs does not count."
            description: "Listen to Minwu's warning and accept his blessing"
    rewards:
      xp: 20
      gold: 0
      items:
        - item_id: "silver_holy_symbol"
          quantity: 1
      disposition_shift: 15
      memory_flags: ["crystal-blessed"]

  # ═══════════════════════════════════════════════════════════
  # NEW QUESTS — Expanding the world
  # ═══════════════════════════════════════════════════════════

  # ── QUEST 7: Hunt — Cactuar Sighting ─────────────────────
  - id: "cactuar_hunt"
    name: "Hunt: Cactuar Sighting"
    description: "The Hunt Board at the Seventh Heaven reports a dangerously quick Cactuar terrorizing travelers near the Golmore entrance. 100 gil bounty."
    giver_id: "innkeeper_mara"
    turn_in_npc_id: "innkeeper_mara"
    min_level: 2
    is_one_time: true
    tags: ["side", "combat", "hunt"]
    stages:
      - id: "find_cactuar"
        name: "Track the Cactuar"
        description: "Head to the Golmore entrance and find the rogue Cactuar."
        narrator_hint: "The Cactuar is absurdly fast and fires needles at anything that moves. It's been disrupting trade caravans. Red XIII already knows about it and can point the player in the right direction."
        objectives:
          - id: "reach_golmore"
            type: Discover
            target_id: "forest_edge"
            description: "Search the Golmore entrance for the Cactuar"
        next_stage_id: "kill_cactuar"
      - id: "kill_cactuar"
        name: "Defeat the Cactuar"
        description: "Fight and defeat the rogue Cactuar."
        narrator_hint: "The Cactuar is small, spiny, and ridiculously fast. Its '1000 Needles' attack hurts. Make it comedic but tense — the thing is a menace."
        objectives:
          - id: "slay_cactuar"
            type: Custom
            custom_condition: "The player has defeated a Cactuar in combat in or near the Golmore Jungle area."
            description: "Defeat the Cactuar"
        next_stage_id: "claim_bounty"
      - id: "claim_bounty"
        name: "Claim the Bounty"
        description: "Return to Lebreau at the Seventh Heaven to collect the hunt reward."
        narrator_hint: "Lebreau is impressed — Cactuars are notoriously hard to catch. She pays the full bounty and marks the hunt as complete on the board."
        objectives:
          - id: "talk_lebreau_bounty"
            type: TalkTo
            target_id: "innkeeper_mara"
            description: "Collect the bounty from Lebreau"
    rewards:
      xp: 60
      gold: 100
      disposition_shift: 10
      memory_flags: ["cactuar-slayer"]

  # ── QUEST 8: Moogle Mail ─────────────────────────────────
  - id: "moogle_mail"
    name: "Moogle Mail Delivery"
    description: "The moogle mail system has a backlog. Cait Sith at the Moogle Post needs someone with working legs to deliver three packages around Rabanastre."
    giver_id: "stray_cat_whiskers"
    turn_in_npc_id: "stray_cat_whiskers"
    min_level: 1
    is_one_time: true
    tags: ["side", "fetch", "beginner", "moogle"]
    stages:
      - id: "deliver_packages"
        name: "Make Deliveries"
        description: "Deliver packages to three locations around Rabanastre."
        narrator_hint: "Cait Sith is comically bad at explaining the routes. The packages are tiny (moogle-sized) and have little pom-pom ribbons. Each recipient reacts differently — Watts grumbles, O'aka tries to sell it back, Matoya knows what's inside before opening it."
        objectives:
          - id: "deliver_forge"
            type: Discover
            target_id: "blacksmith"
            description: "Deliver to Watts' Forge"
          - id: "deliver_shop"
            type: Discover
            target_id: "general_store"
            description: "Deliver to O'aka's Emporium"
          - id: "deliver_market"
            type: Discover
            target_id: "market_stalls"
            description: "Deliver to the Moogle Market"
        next_stage_id: "return_cait_sith"
      - id: "return_cait_sith"
        name: "Return to Cait Sith"
        description: "Report back to Cait Sith at the Moogle Post."
        narrator_hint: "Cait Sith rewards you with a terrible fortune reading and a handful of gil. The fortune is spectacularly wrong but he insists it's accurate."
        objectives:
          - id: "talk_cait_sith"
            type: TalkTo
            target_id: "stray_cat_whiskers"
            description: "Report back to Cait Sith"
    rewards:
      xp: 25
      gold: 15
      disposition_shift: 10
      memory_flags: ["moogle-friend"]

  # ── QUEST 9: Cid's Airship Parts ────────────────────────
  - id: "cid_airship_parts"
    name: "Cid's Airship Dream"
    description: "Cid Highwind is rebuilding an airship in secret. He needs rare parts from dangerous places — and someone crazy enough to fetch them."
    giver_id: "dungeon_master_garrick"
    turn_in_npc_id: "dungeon_master_garrick"
    min_level: 2
    is_one_time: true
    tags: ["side", "fetch", "exploration", "chain"]
    stages:
      - id: "find_mythril_coil"
        name: "Salvage Mythril Coils"
        description: "Cid needs mythril engine coils from the Pharos. The Occuria cult stockpiles magitek components."
        narrator_hint: "Cid is passionate and profane about his airship project. He describes the Pharos salvage run like a military briefing. The mythril coils are ancient magitek — valuable and dangerous to extract."
        objectives:
          - id: "reach_dungeon"
            type: Discover
            target_id: "dungeon_hall"
            description: "Search the Pharos for mythril coils"
        next_stage_id: "return_parts"
      - id: "return_parts"
        name: "Deliver the Parts"
        description: "Bring the salvaged parts back to Cid."
        narrator_hint: "Cid lights up like a kid at Winterfest. He immediately starts bolting the coils into a half-built engine in the back of the bazaar. Offers to let the player be first mate when it flies. 'If it flies,' he mutters."
        objectives:
          - id: "talk_cid_parts"
            type: TalkTo
            target_id: "dungeon_master_garrick"
            description: "Deliver the parts to Cid"
    rewards:
      xp: 75
      gold: 50
      disposition_shift: 15
      memory_flags: ["cid-crew"]

  # ── QUEST 10: Gilgamesh's Challenge ─────────────────────
  - id: "gilgamesh_challenge"
    name: "Gilgamesh's Challenge"
    description: "Gilgamesh claims to be the greatest swordsman across dimensions. He'll prove it — by fighting YOU. If you can survive three rounds, he'll open his premium stock."
    giver_id: "fence_silas"
    turn_in_npc_id: "fence_silas"
    min_level: 3
    prerequisites: ["waterway_infestation"]
    is_one_time: true
    tags: ["side", "combat", "boss"]
    stages:
      - id: "accept_duel"
        name: "Challenge Gilgamesh"
        description: "Accept Gilgamesh's challenge to a duel in Lowtown."
        narrator_hint: "Gilgamesh makes an absurdly dramatic entrance speech. He pulls out four swords at once (somehow). The duel is theatrical — Gilgamesh is actually dangerous but treats it like performance art. If the player survives, Gilgamesh concedes with zero shame."
        objectives:
          - id: "fight_gilgamesh"
            type: Custom
            custom_condition: "The player has accepted and survived a duel with Gilgamesh in Lowtown. The combat should be winnable but challenging."
            description: "Survive three rounds against Gilgamesh"
        next_stage_id: "claim_prize"
      - id: "claim_prize"
        name: "Collect Your Prize"
        description: "Talk to Gilgamesh to claim your reward."
        narrator_hint: "Gilgamesh weeps dramatically about finding a worthy opponent. He opens a hidden compartment full of rare weapons and insists you take one. 'Gilgamesh always honors his debts! ...Usually!'"
        objectives:
          - id: "talk_gilgamesh_reward"
            type: TalkTo
            target_id: "fence_silas"
            description: "Claim your prize from Gilgamesh"
    rewards:
      xp: 100
      gold: 50
      items:
        - item_id: "shadow_dagger"
          quantity: 1
      disposition_shift: 20
      memory_flags: ["gilgamesh-rival"]

  # ── QUEST 11: The Esper's Call ──────────────────────────
  - id: "esper_call"
    name: "The Esper's Call"
    description: "Minwu hears a voice from the Pharos — an Esper, chained and suffering. The Cult of the Occuria plans to weaponize it. Someone must stop them."
    giver_id: "priest_aldric"
    turn_in_npc_id: "priest_aldric"
    min_level: 3
    prerequisites: ["crystal_blessing", "fran_missing_kin"]
    is_one_time: true
    tags: ["main", "combat", "story", "boss"]
    stages:
      - id: "enter_pharos"
        name: "Enter the Pharos"
        description: "Penetrate the Pharos at Ridorana and find the Cult."
        narrator_hint: "This is the main storyline's climax. The Pharos is foreboding — ancient black stone, thick Mist, and the hum of imprisoned divine power. The player should feel the weight of approaching destiny."
        objectives:
          - id: "reach_shrine"
            type: Discover
            target_id: "cultist_shrine"
            description: "Find the Cult's shrine inside the Pharos"
        next_stage_id: "defeat_seymour"
      - id: "defeat_seymour"
        name: "Confront the High Seeker"
        description: "Defeat Seymour Guado, High Seeker of the Occuria Cult."
        narrator_hint: "Seymour is theatrical and genuinely dangerous. His staff channels raw Mist energy. He'll monologue about the beauty of death before attacking. If the player destroys his staff, his power weakens significantly."
        objectives:
          - id: "kill_seymour"
            type: Kill
            target_id: "cultist_leader"
            required_count: 1
            description: "Defeat Seymour Guado"
        next_stage_id: "face_ultima"
      - id: "face_ultima"
        name: "Face Ultima"
        description: "Ascend to the Pharos Summit and confront the Esper."
        narrator_hint: "The Esper — Ultima, the High Seraph — is beautiful, ancient, and terrifying. This is the ultimate boss fight. Let the player feel the weight of it. Victory should feel legendary."
        objectives:
          - id: "slay_ultima"
            type: Kill
            target_id: "boss_goretusk"
            required_count: 1
            description: "Defeat Ultima, the High Seraph"
        next_stage_id: "return_minwu"
      - id: "return_minwu"
        name: "Return to Minwu"
        description: "Tell Minwu the Esper has been freed."
        narrator_hint: "Minwu weeps with joy. The Crystals sing in response. The player is officially a Warrior of Light. This should feel like a genuine victory — the culmination of the adventure."
        objectives:
          - id: "talk_minwu_finale"
            type: TalkTo
            target_id: "priest_aldric"
            description: "Report to Minwu"
    rewards:
      xp: 500
      gold: 500
      items:
        - item_id: "champion_blade"
          quantity: 1
      disposition_shift: 25
      memory_flags: ["warrior-of-light", "esper-freed"]

  # ── QUEST 12: Tonberry's Grudge ─────────────────────────
  - id: "tonberry_grudge"
    name: "Tonberry's Grudge"
    description: "Deep in the Pharos, a Tonberry stalks the halls with a grudge list longer than its knife. Gilgamesh wants it stopped — it's bad for business."
    giver_id: "fence_silas"
    turn_in_npc_id: "fence_silas"
    min_level: 2
    is_one_time: true
    tags: ["side", "combat", "hunt"]
    stages:
      - id: "find_tonberry"
        name: "Hunt the Tonberry"
        description: "Enter the Pharos and track down the Tonberry."
        narrator_hint: "The Tonberry is iconic — slow, deliberate, lantern in one hand, knife in the other. It doesn't run. It walks. And it always arrives. The horror is in the patience."
        objectives:
          - id: "reach_cult_room"
            type: Discover
            target_id: "cultist_shrine"
            description: "Find the Tonberry in the Pharos"
        next_stage_id: "slay_tonberry"
      - id: "slay_tonberry"
        name: "Defeat the Tonberry"
        description: "Kill the vengeful Tonberry."
        narrator_hint: "The Tonberry fight should be tense. It moves slowly but each knife strike is devastating. The 'Everyone's Grudge' counter-attack punishes players who've killed many monsters."
        objectives:
          - id: "kill_tonberry"
            type: Kill
            target_id: "cultist_grunt"
            required_count: 1
            description: "Defeat the Tonberry"
        next_stage_id: "report_gilgamesh"
      - id: "report_gilgamesh"
        name: "Collect the Bounty"
        description: "Report back to Gilgamesh in Lowtown."
        narrator_hint: "Gilgamesh is dramatically relieved. He makes up an elaborate story about the time HE almost fought a Tonberry. 'Almost' is doing a lot of work in that sentence."
        objectives:
          - id: "talk_gilgamesh_tonberry"
            type: TalkTo
            target_id: "fence_silas"
            description: "Report to Gilgamesh"
    rewards:
      xp: 80
      gold: 75
      disposition_shift: 15
      memory_flags: ["tonberry-slayer"]
