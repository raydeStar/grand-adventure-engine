  # ГўвЂќв‚¬ГўвЂќв‚¬ QUEST: The Dying Crystal ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  - id: "crystal_dying"
    name: "The Dying Crystal"
    description: "Marquis Odran reveals that the four elemental Crystals that once shielded Valeward are fading. Without them, the Void Гўв‚¬вЂќ an ancient force of annihilation Гўв‚¬вЂќ will consume the kingdom. The Water Crystal's temple lies beneath the Oldwater Tunnels. Someone must retrieve it before the light goes out."
    giver_id: "marquis_odran"
    turn_in_npc_id: "marquis_odran"
    min_level: 2
    is_one_time: true
    tags: ["main", "story", "crystal"]
    stages:
      - id: "seek_water_temple"
        name: "Find the Water Temple"
        description: "Descend into the tunnels beneath the Oldwater Tunnels and locate the Water Temple Sanctum."
        narrator_hint: "The player is delving into ancient flooded tunnels beneath Stonewake in search of the Water Crystal. Build atmosphere Гўв‚¬вЂќ dripping stone, eerie blue light, the sense of descending into something sacred and forgotten. The temple predates the city by millennia."
        objectives:
          - id: "discover_water_sanctum"
            type: Discover
            target_id: "water_temple_sanctum"
            description: "Find the Water Temple Sanctum"
        next_stage_id: "defeat_tidewrought"
      - id: "defeat_tidewrought"
        name: "Defeat the Tidal Lord"
        description: "Tidewrought, the ancient guardian of the Water Crystal, will not yield its charge willingly. Defeat it."
        narrator_hint: "This is the player's first Crystal boss fight. Tidewrought is proud, ancient, and powerful. The battle should feel like a genuine test Гўв‚¬вЂќ the sanctum floods, water crashes, and the serpent strikes with the fury of the deep ocean. Victory should feel earned."
        objectives:
          - id: "kill_tidewrought"
            type: Kill
            target_id: "tidewrought_guardian"
            required_count: 1
            description: "Defeat Tidewrought, the Tidal Lord"
        next_stage_id: "return_water_crystal"
      - id: "return_water_crystal"
        name: "Return the Water Crystal"
        description: "Bring the Water Crystal to Marquis Odran at City Hall."
        narrator_hint: "Odran is visibly moved when the player returns with the Water Crystal. For the first time, hope breaks through his careful political mask. He explains that three more Crystals remain Гўв‚¬вЂќ Fire, Earth, and Wind Гўв‚¬вЂќ scattered in temples across the land. The crusade has begun."
        objectives:
          - id: "talk_odran_water"
            type: TalkTo
            target_id: "marquis_odran"
            description: "Deliver the Water Crystal to Marquis Odran"
    rewards:
      xp: 100
      gold: 50
      unlocks_quest: "crystal_crusade_fire"
      disposition_shift: 20
      memory_flags: ["water-crystal-recovered", "crystal-crusader"]

  # ГўвЂќв‚¬ГўвЂќв‚¬ QUEST: Trial of Fire ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  - id: "crystal_crusade_fire"
    name: "Trial of Fire"
    description: "The Fire Crystal burns in a volcanic temple east of the Emberwood. Cindermaw, the Infernal Lord, guards it with the fury of a thousand suns. Odran warns that the volcano is active Гўв‚¬вЂќ speed and strength in equal measure will be needed."
