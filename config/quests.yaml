            description: "Reach the Heart of the Mountain"
        next_stage_id: "defeat_stonegrief"
      - id: "defeat_stonegrief"
        name: "Defeat the Earthshaker"
        description: "Stonegrief awaits in the crystal cavern. His patience is geological. His fists are mountains."
        narrator_hint: "Stonegrief is the most physically imposing of the four guardians. The cavern shakes with every step he takes. His Earthen Fury attack reshapes the battlefield Гўв‚¬вЂќ pillars collapse, the floor cracks, and boulders rain from the ceiling. This is a fight of endurance and timing."
