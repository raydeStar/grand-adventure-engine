        objectives:
          - id: "talk_odran_wind"
            type: TalkTo
            target_id: "marquis_odran"
            description: "Deliver the Wind Crystal to Marquis Odran"
    rewards:
      xp: 100
      gold: 50
      disposition_shift: 15
      memory_flags: ["wind-crystal-recovered"]

  # ГўвЂќв‚¬ГўвЂќв‚¬ QUEST: The Void Awaits ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  - id: "the_void_awaits"
    name: "The Void Awaits"
    description: "All four Crystals are gathered, and their combined light has revealed the truth: a rift to the Void Гўв‚¬вЂќ the dimension of nothingness Гўв‚¬вЂќ has opened beneath the Crystal Sanctum. Nullthorn, the ancient Warlock of the Void, draws power from the rift to unmake reality itself. Someone must enter the Void and end him, or everything Гўв‚¬вЂќ every memory, every dream, every life Гўв‚¬вЂќ will be erased."
    giver_id: "marquis_odran"
    turn_in_npc_id: "marquis_odran"
    min_level: 4
    prerequisites: ["crystal_crusade_fire", "crystal_crusade_earth", "crystal_crusade_wind"]
    is_one_time: true
    tags: ["main", "story", "crystal", "void", "final"]
    stages:
      - id: "enter_void"
        name: "Enter the Void"
        description: "Descend through the rift beneath the Crystal Sanctum and reach the Throne of Nothingness."
        narrator_hint: "This is it Гўв‚¬вЂќ the final dungeon. The rift beneath the Crystal Sanctum opens into a dimension where reality has been revoked. The player passes through shattered dimensions, fights void-corrupted guardians, and arrives at a throne carved from the absence of existence. Build dread, wonder, and the weight of finality. Everything the player has done has led here."
        objectives:
          - id: "discover_void_throne"
            type: Discover
            target_id: "void_throne"
            description: "Reach the Throne of Nothingness"
        next_stage_id: "defeat_nullthorn"
      - id: "defeat_nullthorn"
        name: "Defeat Nullthorn"
        description: "Nullthorn, Master of the Void, awaits on his throne of nothingness. End him. End this."
        narrator_hint: "The final boss fight. Nullthorn is theatrical, powerful, and genuinely terrifying. He monologues about the beauty of oblivion, wields the Void as a weapon, and unleashes Null Crown Гўв‚¬вЂќ an attack that warps reality itself. The fight should feel deidolonate, epic, and ultimately triumphant. When Nullthorn falls, the Void begins to collapse. The player must escape. Light returns. Make the player feel like a true Lightbound Champion."
        objectives:
          - id: "kill_nullthorn"
            type: Kill
            target_id: "nullthorn_void"
            required_count: 1
            description: "Defeat Nullthorn, Master of the Void"
        next_stage_id: "return_victorious"
      - id: "return_victorious"
        name: "Return Victorious"
        description: "The Void collapses. Light returns. Report to Marquis Odran Гўв‚¬вЂќ the kingdom is saved."
        narrator_hint: "The return should be a victory lap. The rift seals behind the player. Sunlight pours into the Crystal Sanctum. Citizens cheer in the streets. Odran meets the player with tears in his eyes and declares them the Savior of Valeward. Every NPC the player has helped along the way acknowledges the victory. This is the ending Гўв‚¬вЂќ make it legendary."
        objectives:
          - id: "talk_odran_victory"
            type: TalkTo
            target_id: "marquis_odran"
            description: "Report to Marquis Odran"
    rewards:
      xp: 1000
      gold: 500
      items:
        - item_id: "brave_blade"
          quantity: 1
      disposition_shift: 50
      memory_flags: ["void-defeated", "savior-of-valeward", "lightbound-champion-true"]
