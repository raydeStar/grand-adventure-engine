          - id: "kill_stonegrief"
            type: Kill
            target_id: "stonegrief_guardian"
            required_count: 1
            description: "Defeat Stonegrief, the Earthshaker"
        next_stage_id: "return_earth_crystal"
      - id: "return_earth_crystal"
        name: "Return the Earth Crystal"
        description: "Bring the Earth Crystal to Marquis Odran."
        narrator_hint: "Odran's hands tremble as he accepts the Earth Crystal. The weight of it surprises him. He studies it with the eyes of a man who dares to hope for the first time in years."
        objectives:
          - id: "talk_odran_earth"
            type: TalkTo
            target_id: "marquis_odran"
            description: "Deliver the Earth Crystal to Marquis Odran"
    rewards:
