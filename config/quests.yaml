        name: "Defeat the Storm Empress"
        description: "Stormvein awaits at the temple's peak. She fights with the fury of a hurricane and the speed of lightning."
        narrator_hint: "Stormvein is the fastest and most agile of the guardians. She fights in three dimensions Гўв‚¬вЂќ swooping, diving, and attacking from impossible angles. Her Sky Rend tears the sky apart. The platform is open-air, the fall is infinite, and Stormvein laughs the entire time. This fight is about speed and adaptation."
