  - id: "rangers_retreat"
    name: "Ranger's Retreat"
    description: "Lena has lost contact with Thorne at the jungle edge. Find him, steady him, and bring him back to the gate before the Aether worsens."
    giver_id: "gate_guard_lena"
    turn_in_npc_id: "gate_guard_lena"
