  - id: "crystal_crusade_wind"
    name: "Trial of Wind"
    description: "The Wind Crystal floats in a temple above the clouds, high above Elderbough Village. Stormvein, the Storm Empress, guards it with hurricanes and lightning. Odran warns this is the most treacherous approach Гўв‚¬вЂќ one misstep means a very long fall."
