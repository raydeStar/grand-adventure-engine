# ══════════════════════════════════════════════════════════════════
# FINAL FANTASY-THEMED QUEST SEED
# "Your next objective is always one more fight away." — Cid
# ══════════════════════════════════════════════════════════════════

quests:
  # ── QUEST 1: Tifa's Rat Problem ────────────────────────────
  - id: "waterway_infestation"
    name: "The Waterway Infestation"
    description: "Tifa's cellar connects to the Garamsythe Waterway, and something down there is scaring away her barbacks. Clear it out."
    giver_id: "innkeeper_mara"
    turn_in_npc_id: "innkeeper_mara"
    min_level: 1
    is_one_time: true
    tags: ["side", "combat", "beginner"]
    stages:
      - id: "kill_rats"
        name: "Clear the Waterway"
        description: "Descend into the Garamsythe Waterway and deal with the infestation."
        narrator_hint: "The player is hunting dire rats mutated by Mist energy in the waterway beneath the Seventh Heaven. Make it visceral — bioluminescent fungus, dripping pipes, bloated rats with glowing blue teeth."
        objectives:
          - id: "kill_giant_rat"
            type: Kill
            target_id: "giant_rat"
            required_count: 1
            description: "Kill the Dire Rat in the Waterway"
        next_stage_id: "return_to_lebreau"
      - id: "return_to_lebreau"
        name: "Report Back"
        description: "Tell Tifa the Waterway is clear."
        narrator_hint: "Tifa is relieved and pours the player a drink on the house. She hints this wasn't the first pest problem — the Mist beneath the city is getting worse."
        objectives:
          - id: "talk_lebreau_done"
            type: TalkTo
            target_id: "innkeeper_mara"
            description: "Report back to Tifa"
    rewards:
      xp: 25
      gold: 10
      unlocks_quest: "cactuar_hunt"
      disposition_shift: 10
      memory_flags: ["helped-with-rats"]

  # ── QUEST 2: Wedge's Lucky Charm ─────────────────────────
  - id: "wedge_lucky_charm"
    name: "Wedge's Lucky Charm"
    description: "Wedge lost his lucky bottle somewhere in Lowtown during a bender. Biggs gave it to him before shipping out. It's the only thing keeping Wedge sane."
    giver_id: "drunk_pete"
    turn_in_npc_id: "drunk_pete"
    min_level: 1
    is_one_time: true
    tags: ["side", "fetch", "beginner"]
    stages:
      - id: "find_bottle"
        name: "Search Lowtown"
        description: "Look for Wedge's lucky bottle somewhere in Lowtown."
        narrator_hint: "Wedge is vague about where he lost it because he was blackout drunk. The player finds an empty potion bottle in Lowtown — Wedge insists it's his lucky charm from Biggs and is pathetically grateful."
        objectives:
          - id: "collect_bottle"
            type: Collect
            target_id: "discarded_bottle"
            required_count: 1
            description: "Find Wedge's lucky bottle in Lowtown"
        next_stage_id: "return_to_wedge"
      - id: "return_to_wedge"
        name: "Return to Wedge"
        description: "Bring the bottle back to Wedge."
        narrator_hint: "Wedge tears up. He'll tell the player a rumor about the Pharos as thanks — something about the cultists smuggling supplies from the bazaar."
        objectives:
          - id: "deliver_to_wedge"
            type: Deliver
            target_id: "drunk_pete"
            required_item_id: "discarded_bottle"
            required_count: 1
            description: "Deliver the bottle to Wedge"
    rewards:
      xp: 15
      gold: 5
      disposition_shift: 15
      memory_flags: ["helped-wedge"]

  # ── QUEST 3: Basch's Patrol ─────────────────────────────
  - id: "patrol_resistance"
    name: "Eyes on the Empire"
    description: "Basch — 'the gate guard' — wants someone to scout Rabanastre's perimeter and report Imperial troop movements."
    giver_id: "guard_bram"
    turn_in_npc_id: "guard_bram"
    min_level: 1
    is_one_time: true
    tags: ["side", "exploration", "beginner"]
    stages:
      - id: "scout_locations"
        name: "Scout the Perimeter"
        description: "Visit key locations around Rabanastre to check for Imperial activity."
        narrator_hint: "The player is doing reconnaissance for Basch. Each location should feel like a recon sweep — note any suspicious Imperial presences, supply movements, or resistance sympathizers."
        objectives:
          - id: "visit_gate"
            type: Discover
            target_id: "town_gate"
            description: "Check the eastern gate"
          - id: "visit_alley"
            type: Discover
            target_id: "back_alley"
            description: "Sweep Lowtown"
          - id: "visit_market"
            type: Discover
            target_id: "market_stalls"
            description: "Check the Moogle Market"
        next_stage_id: "report_basch"
      - id: "report_basch"
        name: "Report to Basch"
        description: "Report your findings to the 'gate guard.'"
        narrator_hint: "Basch nods with quiet approval. For a moment, the legendary captain shows through the common guard's mask. He hints at the resistance's existence without saying more."
        objectives:
          - id: "talk_basch_done"
            type: TalkTo
            target_id: "guard_bram"
            description: "Report back to Basch"
    rewards:
      xp: 30
      gold: 15
      disposition_shift: 10
      memory_flags: ["resistance-contact"]

  # ── QUEST 4: Watts' Masterwork ────────────────────────────
  - id: "watts_masterwork"
    name: "Watts' Masterwork"
    description: "Watts doesn't sell his best mythril to just anyone. Prove you're worthy and he'll forge something special."
    giver_id: "blacksmith_korga"
    turn_in_npc_id: "blacksmith_korga"
    min_level: 1
    prerequisites: ["waterway_infestation"]
    is_one_time: true
    tags: ["side", "combat", "custom"]
    stages:
      - id: "prove_yourself"
        name: "Earn Watts' Respect"
        description: "Show the Bangaa smith you know your way around a blade."
        narrator_hint: "Watts is testing the player's mettle. He respects combat stories that ring true and practical knowledge of steel and tactics. Empty boasting earns nothing."
        objectives:
          - id: "impress_watts"
            type: Custom
            custom_condition: "The player has demonstrated combat prowess or told a convincing war story to Watts during conversation. Bragging without substance should not count."
            description: "Impress Watts with your fighting spirit"
        next_stage_id: "claim_reward"
      - id: "claim_reward"
        name: "Claim Your Prize"
        description: "Talk to Watts to receive the weapon he's forged."
        narrator_hint: "Watts gives a rare grin — all fangs and approval. He reaches under the counter and produces a blade he's been saving. 'This one's earned, not bought.'"
        objectives:
          - id: "talk_watts_reward"
            type: TalkTo
            target_id: "blacksmith_korga"
            description: "Speak with Watts to claim your reward"
    rewards:
      xp: 40
      gold: 0
      items:
        - item_id: "iron_sword"
          quantity: 1
      disposition_shift: 15
      memory_flags: ["watts-approved"]

  # ── QUEST 5: Fran's Missing Kin ──────────────────────────
  - id: "fran_missing_kin"
    name: "Into the Golmore"
    description: "Fran's younger sister Mjrn ventured into the Golmore Jungle and hasn't returned. The Viera won't ask for help — but she'll accept it."
    giver_id: "gate_guard_lena"
    turn_in_npc_id: "gate_guard_lena"
    min_level: 1
    is_one_time: true
    tags: ["main", "exploration", "story"]
    stages:
      - id: "enter_forest"
        name: "Search the Golmore"
        description: "Enter the Golmore Jungle and look for signs of Mjrn."
        narrator_hint: "The player is searching for a missing Viera in the jungle. The atmosphere should be thick with Mist and foreboding. The jungle feels alive and watchful. Build tension — something drove Mjrn deeper."
        objectives:
          - id: "reach_forest"
            type: Discover
            target_id: "forest_edge"
            description: "Enter the Golmore Jungle"
    rewards:
      xp: 50
      gold: 20
      disposition_shift: 20
      memory_flags: ["fran-trusted", "!golmore-explorer"]

  # ── QUEST 5B: Red XIII Escort ─────────────────────────────
  - id: "rangers_retreat"
    name: "Ranger's Retreat"
    description: "Fran has lost contact with Red XIII at the jungle edge. Find him, steady him, and bring him back to the gate before the Mist worsens."
    giver_id: "gate_guard_lena"
    turn_in_npc_id: "gate_guard_lena"
    min_level: 1
    is_one_time: true
    tags: ["side", "escort", "forest"]
    offer_hint: "Fran keeps her worry sheathed behind discipline. She asks for help like a soldier issuing orders because admitting fear would cost too much."
    completion_hint: "Fran's relief is quiet but unmistakable. The gate feels safer with Red XIII back beneath its stone arch."
    failure_hint: "If Red XIII is lost in the Mist, Fran takes it as a personal failing and the jungle grows that much more hostile."
    stages:
      - id: "find_red"
        name: "Find Red XIII"
        description: "Reach the Golmore Entrance and speak with Red XIII."
        narrator_hint: "The jungle edge is uneasy, thick with Mist and half-heard movement. Red XIII is alert, proud, and reluctant to withdraw."
        objectives:
          - id: "talk_red"
            type: TalkTo
            target_id: "ranger_thorne"
            target_name: "Red XIII"
            description: "Find Red XIII at the Golmore Entrance"
        next_stage_id: "bring_red_home"
      - id: "bring_red_home"
        name: "Bring Red XIII Back"
        description: "Escort Red XIII safely back to the city gate."
        narrator_hint: "Red XIII yields only when the danger becomes undeniable. The retreat should feel tense, disciplined, and one step ahead of something hungry in the trees."
        objectives:
          - id: "escort_red"
            type: Escort
            target_id: "ranger_thorne"
            target_name: "Red XIII"
            location_constraint: "town_gate"
            description: "Escort Red XIII back to the gate"
    rewards:
      xp: 35
      gold: 20
      disposition_shift: 10
      memory_flags: ["helped-red-xiii"]

  # ── QUEST 6: Crystal Blessing ────────────────────────────
  - id: "crystal_blessing"
    name: "The Crystal's Favor"
    description: "Minwu senses the Crystals crying out. He wants to bless a worthy adventurer before the darkness deepens."
    giver_id: "priest_aldric"
    turn_in_npc_id: "priest_aldric"
    min_level: 1
    is_one_time: true
    tags: ["side", "story", "custom"]
    stages:
      - id: "seek_blessing"
        name: "Receive the Blessing"
        description: "Speak with Minwu about the Crystals' warning."
        narrator_hint: "Minwu is earnest and slightly unhinged. He genuinely believes the Crystals speak to him and that the player is a Warrior of Light. The blessing ceremony should feel real and weighty — crystal light, warmth, a moment of genuine hope despite Minwu's eccentricities."
        objectives:
          - id: "listen_minwu"
            type: Custom
            custom_condition: "The player has listened to Minwu's concerns about the Crystal and accepted his offer of a blessing during conversation. Simply asking about healing costs does not count."
            description: "Listen to Minwu's warning and accept his blessing"
    rewards:
      xp: 20
      gold: 0
      items:
        - item_id: "silver_holy_symbol"
          quantity: 1
      disposition_shift: 15
      memory_flags: ["crystal-blessed"]

  # ═══════════════════════════════════════════════════════════
  # NEW QUESTS — Expanding the world
  # ═══════════════════════════════════════════════════════════

  # ── QUEST 7: Hunt — Cactuar Sighting ─────────────────────
  - id: "cactuar_hunt"
    name: "Hunt: Cactuar Sighting"
    description: "The Hunt Board at the Seventh Heaven reports a dangerously quick Cactuar terrorizing travelers near the Golmore entrance. 100 gil bounty."
    giver_id: "innkeeper_mara"
    turn_in_npc_id: "innkeeper_mara"
    min_level: 2
    is_party_quest: true
    is_one_time: true
    tags: ["side", "combat", "hunt"]
    stages:
      - id: "find_cactuar"
        name: "Track the Cactuar"
        description: "Head to the Golmore entrance and find the rogue Cactuar."
        narrator_hint: "The Cactuar is absurdly fast and fires needles at anything that moves. It's been disrupting trade caravans. Red XIII already knows about it and can point the player in the right direction."
        objectives:
          - id: "reach_golmore"
            type: Discover
            target_id: "forest_edge"
            description: "Search the Golmore entrance for the Cactuar"
        next_stage_id: "kill_cactuar"
      - id: "kill_cactuar"
        name: "Defeat the Cactuar"
        description: "Fight and defeat the rogue Cactuar."
        narrator_hint: "The Cactuar is small, spiny, and ridiculously fast. Its '1000 Needles' attack hurts. Make it comedic but tense — the thing is a menace."
        objectives:
          - id: "slay_cactuar"
            type: Custom
            custom_condition: "The player has defeated a Cactuar in combat in or near the Golmore Jungle area."
            description: "Defeat the Cactuar"
        next_stage_id: "claim_bounty"
      - id: "claim_bounty"
        name: "Claim the Bounty"
        description: "Return to Tifa at the Seventh Heaven to collect the hunt reward."
        narrator_hint: "Tifa is impressed — Cactuars are notoriously hard to catch. She pays the full bounty and marks the hunt as complete on the board."
        objectives:
          - id: "talk_lebreau_bounty"
            type: TalkTo
            target_id: "innkeeper_mara"
            description: "Collect the bounty from Tifa"
    rewards:
      xp: 60
      gold: 100
      disposition_shift: 10
      memory_flags: ["cactuar-slayer"]

  # ── QUEST 8: Moogle Mail ─────────────────────────────────
  - id: "moogle_mail"
    name: "Moogle Mail Delivery"
    description: "The moogle mail system has a backlog. Cait Sith at the Moogle Post needs someone with working legs to deliver three packages around Rabanastre."
    giver_id: "stray_cat_whiskers"
    turn_in_npc_id: "stray_cat_whiskers"
    min_level: 1
    is_one_time: true
    tags: ["side", "fetch", "beginner", "moogle"]
    stages:
      - id: "deliver_packages"
        name: "Make Deliveries"
        description: "Deliver packages to three locations around Rabanastre."
        narrator_hint: "Cait Sith is comically bad at explaining the routes. The packages are tiny (moogle-sized) and have little pom-pom ribbons. Each recipient reacts differently — Watts grumbles, O'aka tries to sell it back, Matoya knows what's inside before opening it."
        objectives:
          - id: "deliver_forge"
            type: Discover
            target_id: "blacksmith"
            description: "Deliver to Watts' Forge"
          - id: "deliver_shop"
            type: Discover
            target_id: "general_store"
            description: "Deliver to O'aka's Emporium"
          - id: "deliver_market"
            type: Discover
            target_id: "market_stalls"
            description: "Deliver to the Moogle Market"
        next_stage_id: "return_cait_sith"
      - id: "return_cait_sith"
        name: "Return to Cait Sith"
        description: "Report back to Cait Sith at the Moogle Post."
        narrator_hint: "Cait Sith rewards you with a terrible fortune reading and a handful of gil. The fortune is spectacularly wrong but he insists it's accurate."
        objectives:
          - id: "talk_cait_sith"
            type: TalkTo
            target_id: "stray_cat_whiskers"
            description: "Report back to Cait Sith"
    rewards:
      xp: 25
      gold: 15
      disposition_shift: 10
      memory_flags: ["moogle-friend"]

  # ── QUEST 9: Cid's Airship Parts ────────────────────────
  - id: "cid_airship_parts"
    name: "Cid's Airship Dream"
    description: "Cid Highwind is rebuilding an airship in secret. He needs rare parts from dangerous places — and someone crazy enough to fetch them."
    giver_id: "dungeon_master_garrick"
    turn_in_npc_id: "dungeon_master_garrick"
    min_level: 2
    is_one_time: true
    tags: ["side", "fetch", "exploration", "chain"]
    stages:
      - id: "find_mythril_coil"
        name: "Salvage Mythril Coils"
        description: "Cid needs mythril engine coils from the Pharos. The Occuria cult stockpiles magitek components."
        narrator_hint: "Cid is passionate and profane about his airship project. He describes the Pharos salvage run like a military briefing. The mythril coils are ancient magitek — valuable and dangerous to extract."
        objectives:
          - id: "reach_dungeon"
            type: Discover
            target_id: "dungeon_hall"
            description: "Search the Pharos for mythril coils"
        next_stage_id: "return_parts"
      - id: "return_parts"
        name: "Deliver the Parts"
        description: "Bring the salvaged parts back to Cid."
        narrator_hint: "Cid lights up like a kid at Winterfest. He immediately starts bolting the coils into a half-built engine in the back of the bazaar. Offers to let the player be first mate when it flies. 'If it flies,' he mutters."
        objectives:
          - id: "talk_cid_parts"
            type: TalkTo
            target_id: "dungeon_master_garrick"
            description: "Deliver the parts to Cid"
    rewards:
      xp: 75
      gold: 50
      disposition_shift: 15
      memory_flags: ["cid-crew"]

  # ── QUEST 10: Gilgamesh's Challenge ─────────────────────
  - id: "gilgamesh_challenge"
    name: "Gilgamesh's Challenge"
    description: "Gilgamesh claims to be the greatest swordsman across dimensions. He'll prove it — by fighting YOU. If you can survive three rounds, he'll open his premium stock."
    giver_id: "fence_silas"
    turn_in_npc_id: "fence_silas"
    min_level: 3
    prerequisites: ["waterway_infestation"]
    is_one_time: true
    tags: ["side", "combat", "boss"]
    stages:
      - id: "accept_duel"
        name: "Challenge Gilgamesh"
        description: "Accept Gilgamesh's challenge to a duel in Lowtown."
        narrator_hint: "Gilgamesh makes an absurdly dramatic entrance speech. He pulls out four swords at once (somehow). The duel is theatrical — Gilgamesh is actually dangerous but treats it like performance art. If the player survives, Gilgamesh concedes with zero shame."
        objectives:
          - id: "fight_gilgamesh"
            type: Survive
            target_id: "back_alley"
            required_count: 3
            description: "Survive three rounds against Gilgamesh"
        next_stage_id: "claim_prize"
      - id: "claim_prize"
        name: "Collect Your Prize"
        description: "Talk to Gilgamesh to claim your reward."
        narrator_hint: "Gilgamesh weeps dramatically about finding a worthy opponent. He opens a hidden compartment full of rare weapons and insists you take one. 'Gilgamesh always honors his debts! ...Usually!'"
        objectives:
          - id: "talk_gilgamesh_reward"
            type: TalkTo
            target_id: "fence_silas"
            description: "Claim your prize from Gilgamesh"
    rewards:
      xp: 100
      gold: 50
      items:
        - item_id: "shadow_dagger"
          quantity: 1
      disposition_shift: 20
      memory_flags: ["gilgamesh-rival"]

  # ── QUEST 11: The Esper's Call ──────────────────────────
  - id: "esper_call"
    name: "The Esper's Call"
    description: "Minwu hears a voice from the Pharos — an Esper, chained and suffering. The Cult of the Occuria plans to weaponize it. Someone must stop them."
    giver_id: "priest_aldric"
    turn_in_npc_id: "priest_aldric"
    min_level: 3
    prerequisites: ["crystal_blessing", "fran_missing_kin"]
    is_one_time: true
    tags: ["main", "combat", "story", "boss"]
    stages:
      - id: "enter_pharos"
        name: "Enter the Pharos"
        description: "Penetrate the Pharos at Ridorana and find the Cult."
        narrator_hint: "This is the main storyline's climax. The Pharos is foreboding — ancient black stone, thick Mist, and the hum of imprisoned divine power. The player should feel the weight of approaching destiny."
        objectives:
          - id: "reach_shrine"
            type: Discover
            target_id: "cultist_shrine"
            description: "Find the Cult's shrine inside the Pharos"
        next_stage_id: "defeat_seymour"
      - id: "defeat_seymour"
        name: "Confront the High Seeker"
        description: "Defeat Seymour Guado, High Seeker of the Occuria Cult."
        narrator_hint: "Seymour is theatrical and genuinely dangerous. His staff channels raw Mist energy. He'll monologue about the beauty of death before attacking. If the player destroys his staff, his power weakens significantly."
        objectives:
          - id: "kill_seymour"
            type: Kill
            target_id: "cultist_leader"
            required_count: 1
            description: "Defeat Seymour Guado"
        next_stage_id: "face_ultima"
      - id: "face_ultima"
        name: "Face Ultima"
        description: "Ascend to the Pharos Summit and confront the Esper."
        narrator_hint: "The Esper — Ultima, the High Seraph — is beautiful, ancient, and terrifying. This is the ultimate boss fight. Let the player feel the weight of it. Victory should feel legendary."
        objectives:
          - id: "slay_ultima"
            type: Kill
            target_id: "boss_goretusk"
            required_count: 1
            description: "Defeat Ultima, the High Seraph"
        next_stage_id: "return_minwu"
      - id: "return_minwu"
        name: "Return to Minwu"
        description: "Tell Minwu the Esper has been freed."
        narrator_hint: "Minwu weeps with joy. The Crystals sing in response. The player is officially a Warrior of Light. This should feel like a genuine victory — the culmination of the adventure."
        objectives:
          - id: "talk_minwu_finale"
            type: TalkTo
            target_id: "priest_aldric"
            description: "Report to Minwu"
    rewards:
      xp: 500
      gold: 500
      items:
        - item_id: "champion_blade"
          quantity: 1
      disposition_shift: 25
      memory_flags: ["warrior-of-light", "esper-freed"]

  # ── QUEST 12: Tonberry's Grudge ─────────────────────────
  - id: "tonberry_grudge"
    name: "Tonberry's Grudge"
    description: "Deep in the Pharos, a Tonberry stalks the halls with a grudge list longer than its knife. Gilgamesh wants it stopped — it's bad for business."
    giver_id: "fence_silas"
    turn_in_npc_id: "fence_silas"
    min_level: 2
    is_one_time: true
    tags: ["side", "combat", "hunt"]
    stages:
      - id: "find_tonberry"
        name: "Hunt the Tonberry"
        description: "Enter the Pharos and track down the Tonberry."
        narrator_hint: "The Tonberry is iconic — slow, deliberate, lantern in one hand, knife in the other. It doesn't run. It walks. And it always arrives. The horror is in the patience."
        objectives:
          - id: "reach_cult_room"
            type: Discover
            target_id: "cultist_shrine"
            description: "Find the Tonberry in the Pharos"
        next_stage_id: "slay_tonberry"
      - id: "slay_tonberry"
        name: "Defeat the Tonberry"
        description: "Kill the vengeful Tonberry."
        narrator_hint: "The Tonberry fight should be tense. It moves slowly but each knife strike is devastating. The 'Everyone's Grudge' counter-attack punishes players who've killed many monsters."
        objectives:
          - id: "kill_tonberry"
            type: Kill
            target_id: "cultist_grunt"
            required_count: 1
            description: "Defeat the Tonberry"
        next_stage_id: "report_gilgamesh"
      - id: "report_gilgamesh"
        name: "Collect the Bounty"
        description: "Report back to Gilgamesh in Lowtown."
        narrator_hint: "Gilgamesh is dramatically relieved. He makes up an elaborate story about the time HE almost fought a Tonberry. 'Almost' is doing a lot of work in that sentence."
        objectives:
          - id: "talk_gilgamesh_tonberry"
            type: TalkTo
            target_id: "fence_silas"
            description: "Report to Gilgamesh"
    rewards:
      xp: 80
      gold: 75
      disposition_shift: 15
      memory_flags: ["tonberry-slayer"]

  # ═══════════════════════════════════════════════════════════
  # MAIN QUESTLINE — The Crystal Crusade
  # ═══════════════════════════════════════════════════════════

  # ── QUEST: The Dying Crystal ─────────────────────────────
  - id: "crystal_dying"
    name: "The Dying Crystal"
    description: "Marquis Ondore reveals that the four elemental Crystals that once shielded Dalmasca are fading. Without them, the Void — an ancient force of annihilation — will consume the kingdom. The Water Crystal's temple lies beneath the Garamsythe Waterway. Someone must retrieve it before the light goes out."
    giver_id: "marquis_ondore"
    turn_in_npc_id: "marquis_ondore"
    min_level: 2
    is_one_time: true
    tags: ["main", "story", "crystal"]
    stages:
      - id: "seek_water_temple"
        name: "Find the Water Temple"
        description: "Descend into the tunnels beneath the Garamsythe Waterway and locate the Water Temple Sanctum."
        narrator_hint: "The player is delving into ancient flooded tunnels beneath Rabanastre in search of the Water Crystal. Build atmosphere — dripping stone, eerie blue light, the sense of descending into something sacred and forgotten. The temple predates the city by millennia."
        objectives:
          - id: "discover_water_sanctum"
            type: Discover
            target_id: "water_temple_sanctum"
            description: "Find the Water Temple Sanctum"
        next_stage_id: "defeat_leviathan"
      - id: "defeat_leviathan"
        name: "Defeat the Tidal Lord"
        description: "Leviathan, the ancient guardian of the Water Crystal, will not yield its charge willingly. Defeat it."
        narrator_hint: "This is the player's first Crystal boss fight. Leviathan is proud, ancient, and powerful. The battle should feel like a genuine test — the sanctum floods, water crashes, and the serpent strikes with the fury of the deep ocean. Victory should feel earned."
        objectives:
          - id: "kill_leviathan"
            type: Kill
            target_id: "leviathan_guardian"
            required_count: 1
            description: "Defeat Leviathan, the Tidal Lord"
        next_stage_id: "return_water_crystal"
      - id: "return_water_crystal"
        name: "Return the Water Crystal"
        description: "Bring the Water Crystal to Marquis Ondore at City Hall."
        narrator_hint: "Ondore is visibly moved when the player returns with the Water Crystal. For the first time, hope breaks through his careful political mask. He explains that three more Crystals remain — Fire, Earth, and Wind — scattered in temples across the land. The crusade has begun."
        objectives:
          - id: "talk_ondore_water"
            type: TalkTo
            target_id: "marquis_ondore"
            description: "Deliver the Water Crystal to Marquis Ondore"
    rewards:
      xp: 100
      gold: 50
      unlocks_quest: "crystal_crusade_fire"
      disposition_shift: 20
      memory_flags: ["water-crystal-recovered", "crystal-crusader"]

  # ── QUEST: Trial of Fire ─────────────────────────────────
  - id: "crystal_crusade_fire"
    name: "Trial of Fire"
    description: "The Fire Crystal burns in a volcanic temple east of the Feywood. Ifrit, the Infernal Lord, guards it with the fury of a thousand suns. Ondore warns that the volcano is active — speed and strength in equal measure will be needed."
    giver_id: "marquis_ondore"
    turn_in_npc_id: "marquis_ondore"
    min_level: 3
    prerequisites: ["crystal_dying"]
    is_one_time: true
    tags: ["main", "story", "crystal", "fire"]
    stages:
      - id: "enter_fire_temple"
        name: "Reach the Fire Temple Core"
        description: "Travel through the volcanic wasteland east of the Feywood and penetrate the Fire Temple to its core."
        narrator_hint: "The journey takes the player from the Mist-choked Feywood into scorched volcanic terrain — a dramatic shift. The obsidian temple is ancient and imposing. Heat is a constant enemy. Build the sense of approaching something primal and dangerous."
        objectives:
          - id: "discover_fire_core"
            type: Discover
            target_id: "fire_temple_core"
            description: "Reach the Heart of the Inferno"
        next_stage_id: "defeat_ifrit"
      - id: "defeat_ifrit"
        name: "Defeat the Infernal Lord"
        description: "Ifrit will not relinquish the Fire Crystal without a fight. Survive his flames."
        narrator_hint: "Ifrit is rage incarnate. The magma chamber becomes an arena of fire and fury. Ifrit charges, roars, and unleashes Hellfire — a wall of flame that fills the entire chamber. This fight is visceral and exhausting. Victory should leave the player singed but triumphant."
        objectives:
          - id: "kill_ifrit"
            type: Kill
            target_id: "ifrit_guardian"
            required_count: 1
            description: "Defeat Ifrit, the Infernal Lord"
        next_stage_id: "return_fire_crystal"
      - id: "return_fire_crystal"
        name: "Return the Fire Crystal"
        description: "Bring the Fire Crystal to Marquis Ondore."
        narrator_hint: "Ondore accepts the Fire Crystal with quiet gratitude. Two down, two to go. He marks the remaining temples on the player's map and urges haste — the Void's influence grows stronger with each passing day."
        objectives:
          - id: "talk_ondore_fire"
            type: TalkTo
            target_id: "marquis_ondore"
            description: "Deliver the Fire Crystal to Marquis Ondore"
    rewards:
      xp: 100
      gold: 50
      disposition_shift: 15
      memory_flags: ["fire-crystal-recovered"]

  # ── QUEST: Trial of Earth ────────────────────────────────
  - id: "crystal_crusade_earth"
    name: "Trial of Earth"
    description: "The Earth Crystal lies within a mountain temple east of the Pharos. Titan, the Earthshaker, has guarded it since the mountains were young. Ondore warns that the trail is treacherous and the guardian is the most enduring of the four."
    giver_id: "marquis_ondore"
    turn_in_npc_id: "marquis_ondore"
    min_level: 3
    prerequisites: ["crystal_dying"]
    is_one_time: true
    tags: ["main", "story", "crystal", "earth"]
    stages:
      - id: "enter_earth_temple"
        name: "Reach the Heart of the Mountain"
        description: "Climb the mountain trail east of the Pharos and penetrate the Earth Temple to its heart."
        narrator_hint: "The ascent is punishing — thin air, loose scree, and a golem blocking the path. The temple at the peak is ancient and humbling, built by hands that understood stone on a fundamental level. The deeper the player goes, the more they feel the mountain's weight above them."
        objectives:
          - id: "discover_earth_heart"
            type: Discover
            target_id: "earth_temple_heart"
            description: "Reach the Heart of the Mountain"
        next_stage_id: "defeat_titan"
      - id: "defeat_titan"
        name: "Defeat the Earthshaker"
        description: "Titan awaits in the crystal cavern. His patience is geological. His fists are mountains."
        narrator_hint: "Titan is the most physically imposing of the four guardians. The cavern shakes with every step he takes. His Earthen Fury attack reshapes the battlefield — pillars collapse, the floor cracks, and boulders rain from the ceiling. This is a fight of endurance and timing."
        objectives:
          - id: "kill_titan"
            type: Kill
            target_id: "titan_guardian"
            required_count: 1
            description: "Defeat Titan, the Earthshaker"
        next_stage_id: "return_earth_crystal"
      - id: "return_earth_crystal"
        name: "Return the Earth Crystal"
        description: "Bring the Earth Crystal to Marquis Ondore."
        narrator_hint: "Ondore's hands tremble as he accepts the Earth Crystal. The weight of it surprises him. He studies it with the eyes of a man who dares to hope for the first time in years."
        objectives:
          - id: "talk_ondore_earth"
            type: TalkTo
            target_id: "marquis_ondore"
            description: "Deliver the Earth Crystal to Marquis Ondore"
    rewards:
      xp: 100
      gold: 50
      disposition_shift: 15
      memory_flags: ["earth-crystal-recovered"]

  # ── QUEST: Trial of Wind ─────────────────────────────────
  - id: "crystal_crusade_wind"
    name: "Trial of Wind"
    description: "The Wind Crystal floats in a temple above the clouds, high above Eruyt Village. Garuda, the Storm Empress, guards it with hurricanes and lightning. Ondore warns this is the most treacherous approach — one misstep means a very long fall."
    giver_id: "marquis_ondore"
    turn_in_npc_id: "marquis_ondore"
    min_level: 3
    prerequisites: ["crystal_dying"]
    is_one_time: true
    tags: ["main", "story", "crystal", "wind"]
    stages:
      - id: "enter_wind_temple"
        name: "Reach the Apex of Storms"
        description: "Climb the canopy path above Eruyt Village and reach the floating Wind Temple's apex."
        narrator_hint: "The journey upward is breathtaking — literally and figuratively. The player climbs through the canopy into open sky, arriving at a temple that floats on solidified wind. The architecture is impossibly delicate. The crystal's song can be heard from the entrance. Build wonder and vertigo."
        objectives:
          - id: "discover_wind_apex"
            type: Discover
            target_id: "wind_temple_apex"
            description: "Reach the Apex of the Storm Empress"
        next_stage_id: "defeat_garuda"
      - id: "defeat_garuda"
        name: "Defeat the Storm Empress"
        description: "Garuda awaits at the temple's peak. She fights with the fury of a hurricane and the speed of lightning."
        narrator_hint: "Garuda is the fastest and most agile of the guardians. She fights in three dimensions — swooping, diving, and attacking from impossible angles. Her Aerial Blast tears the sky apart. The platform is open-air, the fall is infinite, and Garuda laughs the entire time. This fight is about speed and adaptation."
        objectives:
          - id: "kill_garuda"
            type: Kill
            target_id: "garuda_guardian"
            required_count: 1
            description: "Defeat Garuda, the Storm Empress"
        next_stage_id: "return_wind_crystal"
      - id: "return_wind_crystal"
        name: "Return the Wind Crystal"
        description: "Bring the Wind Crystal to Marquis Ondore."
        narrator_hint: "When the last Crystal is delivered, Ondore's composure finally breaks. He smiles — genuinely, fully — for perhaps the first time in years. All four Crystals are gathered. But he grows grave again quickly: the Crystals' power has revealed the source of the corruption. A rift to the Void has opened beneath the Crystal Sanctum. Someone must enter it and face whatever waits on the other side."
        objectives:
          - id: "talk_ondore_wind"
            type: TalkTo
            target_id: "marquis_ondore"
            description: "Deliver the Wind Crystal to Marquis Ondore"
    rewards:
      xp: 100
      gold: 50
      disposition_shift: 15
      memory_flags: ["wind-crystal-recovered"]

  # ── QUEST: The Void Awaits ───────────────────────────────
  - id: "the_void_awaits"
    name: "The Void Awaits"
    description: "All four Crystals are gathered, and their combined light has revealed the truth: a rift to the Void — the dimension of nothingness — has opened beneath the Crystal Sanctum. Exdeath, the ancient Warlock of the Void, draws power from the rift to unmake reality itself. Someone must enter the Void and end him, or everything — every memory, every dream, every life — will be erased."
    giver_id: "marquis_ondore"
    turn_in_npc_id: "marquis_ondore"
    min_level: 5
    prerequisites: ["crystal_crusade_fire", "crystal_crusade_earth", "crystal_crusade_wind"]
    is_one_time: true
    tags: ["main", "story", "crystal", "void", "final"]
    stages:
      - id: "enter_void"
        name: "Enter the Void"
        description: "Descend through the rift beneath the Crystal Sanctum and reach the Throne of Nothingness."
        narrator_hint: "This is it — the final dungeon. The rift beneath the Crystal Sanctum opens into a dimension where reality has been revoked. The player passes through shattered dimensions, fights void-corrupted guardians, and arrives at a throne carved from the absence of existence. Build dread, wonder, and the weight of finality. Everything the player has done has led here."
        objectives:
          - id: "discover_void_throne"
            type: Discover
            target_id: "void_throne"
            description: "Reach the Throne of Nothingness"
        next_stage_id: "defeat_exdeath"
      - id: "defeat_exdeath"
        name: "Defeat Exdeath"
        description: "Exdeath, Master of the Void, awaits on his throne of nothingness. End him. End this."
        narrator_hint: "The final boss fight. Exdeath is theatrical, powerful, and genuinely terrifying. He monologues about the beauty of oblivion, wields the Void as a weapon, and unleashes Grand Cross — an attack that warps reality itself. The fight should feel desperate, epic, and ultimately triumphant. When Exdeath falls, the Void begins to collapse. The player must escape. Light returns. Make the player feel like a true Warrior of Light."
        objectives:
          - id: "kill_exdeath"
            type: Kill
            target_id: "exdeath_void"
            required_count: 1
            description: "Defeat Exdeath, Master of the Void"
        next_stage_id: "return_victorious"
      - id: "return_victorious"
        name: "Return Victorious"
        description: "The Void collapses. Light returns. Report to Marquis Ondore — the kingdom is saved."
        narrator_hint: "The return should be a victory lap. The rift seals behind the player. Sunlight pours into the Crystal Sanctum. Citizens cheer in the streets. Ondore meets the player with tears in his eyes and declares them the Savior of Dalmasca. Every NPC the player has helped along the way acknowledges the victory. This is the ending — make it legendary."
        objectives:
          - id: "talk_ondore_victory"
            type: TalkTo
            target_id: "marquis_ondore"
            description: "Report to Marquis Ondore"
    rewards:
      xp: 1000
      gold: 500
      items:
        - item_id: "brave_blade"
          quantity: 1
      disposition_shift: 50
      memory_flags: ["void-defeated", "savior-of-dalmasca", "warrior-of-light-true"]
