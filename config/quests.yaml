    completion_hint: "Lena's relief is quiet but unmistakable. The gate feels safer with Thorne back beneath its stone arch."
    failure_hint: "If Thorne is lost in the Aether, Lena takes it as a personal failing and the jungle grows that much more hostile."
    stages:
      - id: "find_red"
        name: "Find Thorne"
        description: "Reach the Gloamwood Entrance and speak with Thorne."
        narrator_hint: "The jungle edge is uneasy, thick with Aether and half-heard movement. Thorne is alert, proud, and reluctant to withdraw."
        objectives:
          - id: "talk_red"
            type: TalkTo
            target_id: "ranger_thorne"
            target_name: "Thorne"
            description: "Find Thorne at the Gloamwood Entrance"
        next_stage_id: "bring_red_home"
      - id: "bring_red_home"
        name: "Bring Thorne Back"
        description: "Return to the city gate Гўв‚¬вЂќ Thorne follows at your pace, Aether or no Aether."
        narrator_hint: "Thorne yields only when the danger becomes undeniable. The retreat should feel tense, disciplined, and one step ahead of something hungry in the trees. When the player reaches the gate, Thorne is safe."
        objectives:
          - id: "escort_red"
            type: Discover
            target_id: "town_gate"
            description: "Return to the gate with Thorne"
    rewards:
      xp: 35
      gold: 20
      disposition_shift: 10
      memory_flags: ["helped-red-xiii"]

