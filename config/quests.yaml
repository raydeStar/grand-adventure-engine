    turn_in_npc_id: "marquis_odran"
    min_level: 3
    prerequisites: ["crystal_dying"]
    is_one_time: true
    tags: ["main", "story", "crystal", "wind"]
    stages:
      - id: "enter_wind_temple"
        name: "Reach the Apex of Storms"
        description: "Climb the canopy path above Elderbough Village and reach the floating Wind Temple's apex."
        narrator_hint: "The journey upward is breathtaking Гўв‚¬вЂќ literally and figuratively. The player climbs through the canopy into open sky, arriving at a temple that floats on solidified wind. The architecture is impossibly delicate. The crystal's song can be heard from the entrance. Build wonder and vertigo."
        objectives:
          - id: "discover_wind_apex"
            type: Discover
            target_id: "wind_temple_apex"
