    turn_in_npc_id: "marquis_odran"
    min_level: 3
    prerequisites: ["crystal_dying"]
    is_one_time: true
    tags: ["main", "story", "crystal", "fire"]
    stages:
      - id: "enter_fire_temple"
        name: "Reach the Fire Temple Core"
        description: "Travel through the volcanic wasteland east of the Emberwood and penetrate the Fire Temple to its core."
        narrator_hint: "The journey takes the player from the Aether-choked Emberwood into scorched volcanic terrain Гўв‚¬вЂќ a dramatic shift. The obsidian temple is ancient and imposing. Heat is a constant enemy. Build the sense of approaching something primal and dangerous."
        objectives:
          - id: "discover_fire_core"
            type: Discover
            target_id: "fire_temple_core"
            description: "Reach the Heart of the Inferno"
        next_stage_id: "defeat_cindermaw"
      - id: "defeat_cindermaw"
        name: "Defeat the Infernal Lord"
        description: "Cindermaw will not relinquish the Fire Crystal without a fight. Survive his flames."
        narrator_hint: "Cindermaw is rage incarnate. The magma chamber becomes an arena of fire and fury. Cindermaw charges, roars, and unleashes Cinderstorm Гўв‚¬вЂќ a wall of flame that fills the entire chamber. This fight is visceral and exhausting. Victory should leave the player singed but triumphant."
        objectives:
          - id: "kill_cindermaw"
            type: Kill
            target_id: "cindermaw_guardian"
            required_count: 1
            description: "Defeat Cindermaw, the Infernal Lord"
        next_stage_id: "return_fire_crystal"
      - id: "return_fire_crystal"
        name: "Return the Fire Crystal"
        description: "Bring the Fire Crystal to Marquis Odran."
        narrator_hint: "Odran accepts the Fire Crystal with quiet gratitude. Two down, two to go. He marks the remaining temples on the player's map and urges haste Гўв‚¬вЂќ the Void's influence grows stronger with each passing day."
        objectives:
          - id: "talk_odran_fire"
            type: TalkTo
            target_id: "marquis_odran"
            description: "Deliver the Fire Crystal to Marquis Odran"
    rewards:
      xp: 100
      gold: 50
      disposition_shift: 15
      memory_flags: ["fire-crystal-recovered"]

  # ГўвЂќв‚¬ГўвЂќв‚¬ QUEST: Trial of Earth ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬ГўвЂќв‚¬
  - id: "crystal_crusade_earth"
    name: "Trial of Earth"
    description: "The Earth Crystal lies within a mountain temple east of the Blackspire. Stonegrief, the Earthshaker, has guarded it since the mountains were young. Odran warns that the trail is treacherous and the guardian is the most enduring of the four."
