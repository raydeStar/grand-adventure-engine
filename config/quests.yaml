    min_level: 3
    prerequisites: ["crystal_dying"]
    is_one_time: true
    tags: ["main", "story", "crystal", "earth"]
    stages:
      - id: "enter_earth_temple"
        name: "Reach the Heart of the Mountain"
        description: "Climb the mountain trail east of the Blackspire and penetrate the Earth Temple to its heart."
        narrator_hint: "The ascent is punishing Гўв‚¬вЂќ thin air, loose scree, and a golem blocking the path. The temple at the peak is ancient and humbling, built by hands that understood stone on a fundamental level. The deeper the player goes, the more they feel the mountain's weight above them."
