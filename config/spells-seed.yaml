# ══════════════════════════════════════════════════════════════════
# FINAL FANTASY-THEMED SPELL REGISTRY
# "Fire, Fira, Firaga — destruction comes in threes." — Vivi
# ══════════════════════════════════════════════════════════════════

spells:

  # ── EVOCATION (damage dealing) ──────────────────────────────

  - id: magic_missile
    name: Aero
    description: "Razor-sharp blades of wind cut through the target with pinpoint accuracy."
    school: evocation
    mana_cost: 2
    damage_dice: "1d4+1"
    damage_stat: int
    range: ranged
    required_classes: [mage, sorcerer]
    required_level: 1
    power_level: 1
    tags: [wind, auto-hit, single-target]

  - id: firebolt
    name: Fire
    description: "A mote of elemental fire streaks toward the target. The most basic — and beloved — Black Magic spell."
    school: evocation
    mana_cost: 1
    damage_dice: "1d10"
    damage_stat: int
    range: ranged
    required_classes: [mage, sorcerer]
    required_level: 1
    power_level: 1
    tags: [fire, single-target, cantrip]

  - id: fireball
    name: Firaga
    description: "A massive explosion of flame engulfs the area. The pinnacle of fire magic — everything burns."
    school: evocation
    mana_cost: 8
    damage_dice: "3d6"
    damage_stat: int
    range: ranged
    required_classes: [mage, sorcerer]
    required_level: 3
    power_level: 5
    tags: [fire, aoe]

  - id: lightning_bolt
    name: Thundaga
    description: "A devastating bolt of lightning crashes down from above. The air crackles with ozone and terrified screams."
    school: evocation
    mana_cost: 8
    damage_dice: "3d6"
    damage_stat: int
    range: ranged
    required_classes: [mage, sorcerer]
    required_level: 3
    power_level: 5
    tags: [lightning, line]

  - id: sacred_flame
    name: Holy
    description: "Brilliant white radiance descends upon the target, searing the unholy with divine judgment."
    school: evocation
    mana_cost: 1
    damage_dice: "1d8"
    damage_stat: wis
    range: ranged
    required_classes: [cleric]
    required_level: 1
    power_level: 1
    tags: [radiant, single-target, cantrip]

  - id: smite
    name: Banish
    description: "Channel divine energy through your weapon strike, dealing devastating holy damage."
    school: evocation
    mana_cost: 4
    damage_dice: "2d8"
    damage_stat: str
    range: touch
    required_classes: [cleric, fighter]
    required_level: 2
    power_level: 3
    tags: [radiant, melee, single-target]

  # ── RESTORATION (healing) ────────────────────────────────────

  - id: cure_wounds
    name: Cure
    description: "A warm glow of restorative magic mends wounds and eases pain. The White Mage's signature spell."
    school: restoration
    mana_cost: 3
    heal_dice: "1d8+2"
    range: touch
    required_classes: [cleric, ranger]
    required_level: 1
    power_level: 2
    tags: [healing, single-target]

  - id: healing_word
    name: Cura
    description: "A quick utterance of healing magic that restores health at a distance."
    school: restoration
    mana_cost: 2
    heal_dice: "1d4+1"
    range: ranged
    required_classes: [cleric]
    required_level: 1
    power_level: 1
    tags: [healing, single-target, quick]

  - id: lesser_restoration
    name: Esuna
    description: "Cleansing magic washes over the target, purging poison, paralysis, and disease."
    school: restoration
    mana_cost: 4
    status_effect: "cleanse"
    range: touch
    required_classes: [cleric, ranger]
    required_level: 2
    power_level: 3
    tags: [healing, cleanse, single-target]

  # ── ABJURATION (protection) ─────────────────────────────────

  - id: shield
    name: Protect
    description: "An invisible barrier of magical force shields the target from physical harm."
    school: abjuration
    mana_cost: 2
    status_effect: "shielded"
    duration: 3
    range: self
    required_classes: [mage, sorcerer]
    required_level: 1
    power_level: 2
    tags: [defense, self]

  - id: mage_armor
    name: Shell
    description: "A shimmering magical shell surrounds the target, reducing magical damage."
    school: abjuration
    mana_cost: 3
    status_effect: "mage_armor"
    duration: 10
    range: touch
    required_classes: [mage, sorcerer]
    required_level: 1
    power_level: 2
    tags: [defense, single-target]

  - id: bless
    name: Faith
    description: "Divine favor empowers your allies, boosting their accuracy and morale."
    school: abjuration
    mana_cost: 4
    status_effect: "blessed"
    duration: 5
    range: ranged
    required_classes: [cleric]
    required_level: 1
    power_level: 2
    tags: [buff, party]

  # ── ILLUSION ────────────────────────────────────────────────

  - id: minor_illusion
    name: Vanish
    description: "A shimmer of light creates a distracting illusion or renders an object temporarily invisible."
    school: illusion
    mana_cost: 1
    range: ranged
    required_classes: [mage, sorcerer, rogue]
    required_level: 1
    power_level: 1
    tags: [utility, cantrip]

  - id: invisibility
    name: Invisible
    description: "The target fades from sight completely. Even their footsteps fall silent."
    school: illusion
    mana_cost: 5
    status_effect: "invisible"
    duration: 5
    range: touch
    required_classes: [mage, sorcerer, rogue]
    required_level: 2
    power_level: 4
    tags: [stealth, single-target]

  # ── CONJURATION ─────────────────────────────────────────────

  - id: poison_spray
    name: Bio
    description: "A cloud of toxic green Mist sprays toward the target, eating at their flesh."
    school: conjuration
    mana_cost: 1
    damage_dice: "1d12"
    damage_stat: int
    range: touch
    required_classes: [mage, sorcerer, ranger]
    required_level: 1
    power_level: 1
    tags: [poison, single-target, cantrip]

  # ── DIVINATION ──────────────────────────────────────────────

  - id: detect_magic
    name: Libra
    description: "Reveals the hidden properties of creatures and objects within range. Essential scouting magic."
    school: divination
    mana_cost: 2
    range: self
    required_classes: []
    required_level: 1
    power_level: 1
    tags: [utility, detection]

  # ── NECROMANCY ──────────────────────────────────────────────

  - id: chill_touch
    name: Blizzard
    description: "A shard of ice forms and lances toward the target, sapping warmth and life."
    school: necromancy
    mana_cost: 2
    damage_dice: "1d8"
    damage_stat: int
    range: ranged
    required_classes: [mage, sorcerer]
    required_level: 1
    power_level: 2
    tags: [ice, single-target]

  - id: drain_life
    name: Drain
    description: "Dark tendrils of energy siphon life force from the target, restoring the caster's vitality."
    school: necromancy
    mana_cost: 6
    damage_dice: "2d6"
    damage_stat: int
    heal_dice: "1d6"
    range: ranged
    required_classes: [mage, sorcerer]
    required_level: 3
    power_level: 4
    tags: [necrotic, drain, single-target]

  # ── TRANSMUTATION ───────────────────────────────────────────

  - id: haste
    name: Haste
    description: "Time warps around the target, doubling their speed. A classic support spell — and the reason Summoners are always welcome in a party."
    school: transmutation
    mana_cost: 6
    status_effect: "hasted"
    duration: 5
    range: touch
    required_classes: [mage, sorcerer]
    required_level: 3
    power_level: 5
    tags: [buff, single-target]

  # ── RANGER SPELLS ───────────────────────────────────────────

  - id: hunters_mark
    name: "Scan"
    description: "You mystically scan a creature, revealing its weaknesses and marking it as your quarry."
    school: divination
    mana_cost: 2
    status_effect: "marked"
    duration: 10
    range: ranged
    required_classes: [ranger]
    required_level: 1
    power_level: 2
    tags: [buff, tracking, single-target]

  - id: entangle
    name: Slow
    description: "Gravity intensifies around the target area, restraining creatures and slowing their movements."
    school: conjuration
    mana_cost: 3
    status_effect: "entangled"
    duration: 3
    range: ranged
    required_classes: [ranger, cleric]
    required_level: 1
    power_level: 2
    tags: [control, aoe, gravity]
