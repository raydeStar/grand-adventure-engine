# LORE SEED — Demo World: Thornwall & the Dread Hollow
# "Every world begins with a whisper of history." — Sir Thaddeus
#
# VICTORY CONDITION: Defeat Goretusk the Undying in the Dread Hollow depths.
# A small town, a forest, and a dungeon. Short, punchy, and fun.

world:
  name: "Thornwall and the Dread Hollow"
  description: >-
    A small frontier town perched on the edge of a cursed forest.
    Something stirs in the dungeon beneath the old ruins, and the townsfolk
    are too scared to investigate. That's where you come in.

regions:
  - id: "thornwall"
    name: "Thornwall"
    description: "A modest frontier town with a tavern, a blacksmith, and more rumors than residents."
    tags: ["town", "safe", "trade"]

  - id: "whisperwood"
    name: "The Whisperwood"
    description: "A dense, fog-choked forest between Thornwall and the Dread Hollow."
    tags: ["forest", "dark", "wilderness"]

  - id: "dread_hollow"
    name: "The Dread Hollow"
    description: "Ancient ruins and tunnels carved deep into the earth. Something terrible waits at the bottom."
    tags: ["dungeon", "underground", "dangerous"]

factions:
  - id: "thornwall_militia"
    name: "Thornwall Militia"
    description: "The town's small but loyal guard force. Underpaid, overworked, deeply suspicious of adventurers."

  - id: "hollow_cult"
    name: "The Hollow Cult"
    description: "Cultists who worship Goretusk and feed the dungeon with offerings."

  - id: "merchants_guild"
    name: "Thornwall Merchants"
    description: "The shopkeepers and traders who keep Thornwall running."

# ──────────────────────────────────────────────────────────
#  TOWN: THORNWALL
# ──────────────────────────────────────────────────────────

starting_room:
  id: "spawn"
  name: "The Rusted Flagon"
  description: >-
    A creaky tavern that smells of woodsmoke and cheap ale. Mismatched chairs
    surround battered tables, and a mounted boar's head watches the room with
    glass eyes. The barkeep, Mara, keeps one hand under the counter at all times.
    A notice board near the door is covered in bounty postings and desperate pleas.
  exits:
    east: "town_square"
    south: "back_alley"
    down: "tavern_cellar"
  npcs:
    - id: "innkeeper_mara"
      name: "Mara the Barkeep"
      personality: "Warm and flirtatious, but sharp as a knife. Knows every secret in Thornwall. Has a soft spot for adventurers with good stories. Lonely since her husband left."
      faction: "merchants_guild"
      knowledge_scopes: ["rumors", "town", "whisperwood", "dread_hollow", "merchants_guild"]
    - id: "drunk_pete"
      name: "Stumbling Pete"
      personality: "Town drunk. Cowardly, gullible, and desperate for coin. Claims he saw the dungeon boss once. Nobody believes him. Surprisingly honest when sober, which is never."
      faction: "neutral"
      knowledge_scopes: ["rumors", "dread_hollow"]
  items:
    - id: "chipped_mug"
      name: "Chipped Mug"
      description: "A ceramic mug with a crack running down the side. Someone left it on the table half-full of flat ale."
      type: "Misc"
      value: 1
    - id: "half_eaten_bread"
      name: "Half-Eaten Bread"
      description: "A crusty hunk of bread with a bite taken out of it. Still edible, probably."
      type: "Misc"
      value: 1
      is_consumable: true
    - id: "worn_playing_cards"
      name: "Worn Playing Cards"
      description: "A dog-eared deck of playing cards. Several are missing, and the rest are sticky with ale."
      type: "Misc"
      value: 2
  environment_tags: ["indoor", "safe", "lit", "tavern"]

rooms:
  - id: "town_square"
    name: "Thornwall Town Square"
    description: >-
      The heart of Thornwall — a cobblestone clearing ringed by crooked buildings.
      A stone well sits in the center, and a militia guardsman leans against a post,
      watching passersby with the enthusiasm of a man who'd rather be anywhere else.
      The blacksmith's hammer rings from the north. The tavern is to the west, and the
      town gate opens east toward the forest.
    exits:
      west: "spawn"
      north: "blacksmith"
      south: "general_store"
      east: "town_gate"
      southeast: "church"
      northeast: "market_stalls"
      southwest: "town_well"
    npcs:
      - id: "guard_bram"
        name: "Bram the Gate Guard"
        personality: "Stern, gruff, and suspicious. Devoted to his post. Extremely hard to charm or bribe. Respects strength and directness. Hates adventurers who cause trouble."
        faction: "thornwall_militia"
        knowledge_scopes: ["town", "militia", "whisperwood", "security"]
      - id: "dungeon_master_garrick"
        name: "Garrick the Dungeoneer"
        personality: "A weathered old adventurer with a patch over one eye and a scarred grin. Claims he knows the location of every lost dungeon in the realm. For a price, he'll tell you where to find one suited to your skill level. Dramatic storyteller, loves embellishing danger."
        faction: "neutral"
        knowledge_scopes: ["dungeons", "monsters", "treasure", "adventure", "lore"]
        level: 5
    items:
      - id: "loose_cobblestone"
        name: "Loose Cobblestone"
        description: "A cobblestone that's worked itself free from the square. Heavy and rough-edged."
        type: "Misc"
        value: 1
      - id: "wilted_flower"
        name: "Wilted Flower"
        description: "A sad little wildflower dropped by some passerby. Its petals are brown at the edges."
        type: "Misc"
        value: 1
    environment_tags: ["outdoor", "safe", "lit", "town_center"]

  - id: "blacksmith"
    name: "Korga's Forge"
    description: >-
      Waves of heat pour from the open-air forge where a massive orc woman hammers
      glowing steel into shape. Weapons and armor hang from every surface — some
      mundane, others crackling with faint enchantment. A sign reads:
      "YOU BREAK IT, YOU BUY IT. YES, THAT INCLUDES YOUR FACE."
    exits:
      south: "town_square"
    npcs:
      - id: "blacksmith_korga"
        name: "Korga Ironjaw"
        personality: "Blunt, loud, and proud of her work. An orc blacksmith who settled in Thornwall after retiring from mercenary life. Respects fighters. Finds rogues amusing. Will give discounts to people who impress her."
        faction: "merchants_guild"
        knowledge_scopes: ["weapons", "armor", "combat", "mercenary_life"]
        is_shopkeeper: true
        shop_inventory:
          - id: "thunderstrike_blade"
            name: "Thunderstrike Blade"
            description: "A longsword that crackles with blue lightning. Korga's masterwork — she's been looking for someone worthy to carry it."
            type: "Weapon"
            damage_dice: "3d8+5"
            damage_stat: "str"
            value: 500
            is_equippable: true
          - id: "ironbark_plate"
            name: "Ironbark Plate Armor"
            description: "Armor forged from ironwood and tempered steel. Light enough to move in, tough enough to stop a troll's claw."
            type: "Armor"
            armor_value: 6
            value: 400
            is_equippable: true
          - id: "starfall_shield"
            name: "Starfall Shield"
            description: "A round shield inlaid with a meteor fragment. Glows faintly in the dark."
            type: "Shield"
            armor_value: 4
            value: 250
            is_equippable: true
          - id: "iron_sword"
            name: "Iron Sword"
            description: "A simple but reliable blade. Good for beginners."
            type: "Weapon"
            damage_dice: "1d6+1"
            damage_stat: "str"
            value: 25
            is_equippable: true
          - id: "keen_dagger"
            name: "Keen Dagger"
            description: "A wickedly sharp dagger balanced for speed. Perfect for rogues and finesse fighters."
            type: "Weapon"
            damage_dice: "1d6+2"
            damage_stat: "dex"
            value: 30
            is_equippable: true
          - id: "leather_armor"
            name: "Leather Armor"
            description: "Sturdy leather armor. Won't stop a giant, but it's better than nothing."
            type: "Armor"
            armor_value: 2
            value: 15
            is_equippable: true
          - id: "wooden_shield"
            name: "Wooden Shield"
            description: "A basic wooden shield, reinforced with iron bands."
            type: "Shield"
            armor_value: 1
            value: 10
            is_equippable: true
          - id: "iron_helmet"
            name: "Iron Helmet"
            description: "A plain iron helmet. Protects the important bits."
            type: "Helmet"
            armor_value: 1
            value: 20
            is_equippable: true
          - id: "steel_longsword"
            name: "Steel Longsword"
            description: "A well-forged steel blade with a leather-wrapped grip. A reliable weapon for the serious adventurer."
            type: "Weapon"
            damage_dice: "2d6+2"
            damage_stat: "str"
            value: 100
            is_equippable: true
          - id: "iron_greatsword"
            name: "Iron Greatsword"
            description: "A massive two-handed sword. Slow but devastating. Requires both hands to wield."
            type: "Weapon"
            damage_dice: "2d6"
            damage_stat: "str"
            value: 45
            is_equippable: true
            is_two_handed: true
          - id: "str_amulet"
            name: "Amulet of Might"
            description: "A bronze amulet shaped like a clenched fist. Grants the wearer increased physical power."
            type: "Amulet"
            value: 30
            is_equippable: true
            stat_bonuses:
              str: 2
    environment_tags: ["indoor", "safe", "lit", "forge", "hot"]

  - id: "general_store"
    name: "Needful Things"
    description: >-
      A cramped shop stuffed floor to ceiling with everything a frontier town
      could need. Rope, torches, dried rations, questionable potions, and a
      taxidermied owlbear that might be watching you. The shopkeeper, a
      fast-talking halfling named Pip, grins from behind the counter.
    exits:
      north: "town_square"
    npcs:
      - id: "shopkeeper_pip"
        name: "Pip Needler"
        personality: "Cheerful, fast-talking, and a shameless haggler. A halfling with big dreams and bigger prices. Friendly to everyone because everyone is a potential customer. Secretly terrified of the forest."
        faction: "merchants_guild"
        knowledge_scopes: ["trade", "supplies", "rumors", "town"]
        is_shopkeeper: true
        shop_inventory:
          - id: "healing_potion_1"
            name: "Greater Healing Potion"
            description: "A thick red liquid that tastes like cherries and regret. Restores a massive amount of health."
            type: "Potion"
            value: 50
            is_consumable: true
            effect: "Restores 30 HP"
            quantity: 3
          - id: "torch_1"
            name: "Torch"
            description: "A simple torch. Lights the way in dark places."
            type: "Misc"
            value: 2
            quantity: 5
          - id: "minor_healing_potion"
            name: "Minor Healing Potion"
            description: "A small vial of red liquid. Not as strong as the good stuff, but it'll do in a pinch."
            type: "Potion"
            value: 15
            is_consumable: true
            effect: "Restores 2d4+2 HP"
            quantity: 5
          - id: "antidote_1"
            name: "Antidote"
            description: "A bitter green liquid that neutralizes most common poisons."
            type: "Potion"
            value: 10
            is_consumable: true
            effect: "Cures poison"
            quantity: 3
          - id: "rope_1"
            name: "Rope"
            description: "Fifty feet of sturdy hemp rope. Every adventurer needs one."
            type: "Misc"
            value: 5
          - id: "rations_1"
            name: "Rations"
            description: "Dried meat, hardtack, and a questionable cheese. Keeps you alive."
            type: "Misc"
            value: 3
            is_consumable: true
            quantity: 10
          - id: "lockpick_set"
            name: "Lockpick Set"
            description: "A leather case containing picks and tension wrenches. For 'legitimate' use only."
            type: "Misc"
            value: 20
          - id: "copper_ring"
            name: "Copper Ring of Fortitude"
            description: "A simple copper band etched with protective runes. Warms slightly to the touch."
            type: "Ring"
            value: 15
            is_equippable: true
            stat_bonuses:
              con: 1
          - id: "leather_gloves"
            name: "Leather Gloves"
            description: "Sturdy leather gloves that improve grip and protect the hands. Every adventurer needs a pair."
            type: "Gloves"
            armor_value: 1
            value: 8
            is_equippable: true
          - id: "traveler_boots"
            name: "Traveler's Boots"
            description: "Well-worn boots with thick soles. They make long journeys far more bearable."
            type: "Boots"
            armor_value: 1
            value: 12
            is_equippable: true
            stat_bonuses:
              dex: 1
    environment_tags: ["indoor", "safe", "lit", "shop"]

  - id: "back_alley"
    name: "Thornwall Back Alley"
    description: >-
      A narrow, shadow-choked passage behind the tavern. Crates and barrels
      are stacked haphazardly, and the air smells of damp stone and something
      less pleasant. A hooded figure leans against the wall, watching you with
      unsettling calm.
    exits:
      north: "spawn"
    npcs:
      - id: "fence_silas"
        name: "Silas the Fence"
        personality: "Quiet, calculating, and amoral. Buys and sells anything with no questions asked. Loyal only to coin. Secretly a member of a thieves' network. Very hard to deceive — he's heard every con."
        faction: "neutral"
        knowledge_scopes: ["black_market", "rumors", "dread_hollow", "hollow_cult"]
        is_shopkeeper: true
        shop_inventory:
          - id: "shadow_dagger"
            name: "Nightfang Dagger"
            description: "A wickedly curved dagger that seems to drink the light. Impossibly sharp. Previous owner didn't need it anymore — on account of being dead."
            type: "Weapon"
            damage_dice: "2d8+4"
            damage_stat: "dex"
            value: 300
            is_equippable: true
          - id: "poison_vial"
            name: "Poison Vial"
            description: "A small vial of viscous purple liquid. Coat a weapon to add poison damage."
            type: "Misc"
            value: 30
            is_consumable: true
            effect: "Coat weapon with poison"
          - id: "smoke_bomb"
            name: "Smoke Bomb"
            description: "A clay sphere filled with alchemical powder. Breaks on impact, filling the area with thick smoke."
            type: "Misc"
            value: 25
            is_consumable: true
            effect: "Escape combat"
          - id: "thieves_tools"
            name: "Thieves' Tools"
            description: "A professional set of lockpicks, files, and prybars. For the discerning rogue."
            type: "Misc"
            value: 35
          - id: "cloak_of_shadows"
            name: "Cloak of Shadows"
            description: "A dark cloak that seems to shift and blend with the shadows. Light as silk, but surprisingly protective."
            type: "Cloak"
            armor_value: 1
            value: 100
            is_equippable: true
            stat_bonuses:
              dex: 2
          - id: "ring_of_cunning"
            name: "Ring of Cunning"
            description: "A thin silver band inscribed with tiny runes. It sharpens the wearer's wit and tongue."
            type: "Ring"
            value: 75
            is_equippable: true
            stat_bonuses:
              cha: 2
              int: 1
          - id: "shadow_bracelet"
            name: "Shadow Bracelet"
            description: "A braided leather bracelet with obsidian beads. Grants the wearer uncanny reflexes."
            type: "Bracelet"
            value: 60
            is_equippable: true
            stat_bonuses:
              dex: 1
              luck: 2
    items:
      - id: "discarded_bottle"
        name: "Discarded Bottle"
        description: "An empty glass bottle tossed into the gutter. Smells faintly of cheap whiskey."
        type: "Misc"
        value: 1
      - id: "torn_wanted_poster"
        name: "Torn Wanted Poster"
        description: "A rain-smeared wanted poster ripped from the notice board. Only the word 'DANGEROUS' is still legible."
        type: "Misc"
        value: 1
      - id: "bent_nail"
        name: "Bent Nail"
        description: "A rusty iron nail bent at an awkward angle. Could poke an eye out if you tried hard enough."
        type: "Misc"
        value: 1
    environment_tags: ["outdoor", "dark", "shady", "alley"]

  - id: "town_gate"
    name: "Thornwall Eastern Gate"
    description: >-
      The town's main gate — two heavy wooden doors reinforced with iron bands.
      Beyond them, a dirt road winds into the dark tree line of the Whisperwood.
      Claw marks score the outside of the gate. A militia guard paces nervously.
    exits:
      west: "town_square"
      east: "forest_edge"
    npcs:
      - id: "gate_guard_lena"
        name: "Lena the Gate Guard"
        personality: "Young, nervous, and eager to prove herself. Recently joined the militia after her brother went missing in the Whisperwood. Brave but inexperienced. Easy to talk to, hard to intimidate because she's already scared of everything. Will ask the player to look for her brother's journal if they're heading into the forest."
        faction: "thornwall_militia"
        knowledge_scopes: ["militia", "whisperwood", "monsters", "missing_people"]
    items:
      - id: "discarded_torch"
        name: "Discarded Torch"
        description: "A half-burned torch dropped by a previous patrol. Still has some life left in it."
        type: "Misc"
        value: 1
      - id: "militia_notice"
        name: "Militia Notice"
        description: "A posted warning about increased wolf activity in the Whisperwood. 'Report all sightings to Captain Holt. Do NOT engage alone.' Someone has written 'too late' in the margin."
        type: "Misc"
        value: 1
      - id: "broken_arrow"
        name: "Broken Arrow"
        description: "A snapped arrow shaft with dark stains on the tip. Found wedged between the gate's iron bands."
        type: "Misc"
        value: 1
    environment_tags: ["outdoor", "lit", "fortified", "gate"]

  - id: "church"
    name: "Chapel of the Silver Light"
    description: >-
      A small stone chapel tucked behind the town square, its steeple topped with
      a tarnished silver crescent. Inside, stained glass windows cast colored light
      across worn wooden pews. The air smells of incense and old candle wax. A
      priest potters about near the altar, muttering prayers to himself and
      occasionally arguing with someone who isn't there.
    exits:
      northwest: "town_square"
    npcs:
      - id: "priest_aldric"
        name: "Father Aldric"
        personality: "A kindly but slightly unhinged priest who claims to hear the voice of the Silver Light directly. Blesses items for adventurers with genuine enthusiasm. Tends to trail off mid-sentence to listen to 'guidance' no one else can hear. Harmless, generous, and deeply convinced the apocalypse is next Tuesday."
        faction: "neutral"
        knowledge_scopes: ["religion", "blessings", "undead", "holy_relics", "town"]
    items:
      - id: "prayer_candle"
        name: "Prayer Candle"
        description: "A stubby white candle inscribed with a tiny prayer. It smells of lavender and hope."
        type: "Misc"
        value: 1
      - id: "dusty_hymnal"
        name: "Dusty Hymnal"
        description: "A leather-bound book of hymns. Most of the pages are stuck together, and someone has doodled in the margins."
        type: "Misc"
        value: 2
      - id: "silver_holy_symbol"
        name: "Silver Holy Symbol"
        description: "A polished silver pendant in the shape of a radiant sun. Warm to the touch and faintly luminous. Grants clarity of mind to the wearer."
        type: "Amulet"
        value: 15
        is_equippable: true
        stat_bonuses:
          wis: 1
    environment_tags: ["indoor", "safe", "lit", "holy", "chapel"]

  - id: "tavern_cellar"
    name: "The Flagon's Cellar"
    description: >-
      A damp, musty cellar beneath the Rusted Flagon. Barrels of ale and crates
      of supplies line the rough stone walls. Cobwebs hang thick from the low
      ceiling, and something skitters in the shadows between the barrels. The
      only light comes from the trapdoor above and the faint glow of rat eyes
      watching from the dark corners.
    exits:
      up: "spawn"
    npcs:
      - id: "giant_rat"
        name: "Giant Rat"
        personality: "A bloated, aggressive rat the size of a small dog. Its fur is matted and its teeth are yellow. Fiercely territorial over its barrel kingdom. Hisses and lunges at anything that gets too close."
        faction: "neutral"
        knowledge_scopes: []
        is_hostile: true
        level: 1
        hp: 8
        max_hp: 8
        attack_bonus: 1
        damage_dice: "1d4"
        defense: 9
        loot:
          - id: "rat_tail"
            name: "Giant Rat Tail"
            description: "A thick, greasy rat tail. Disgusting, but some alchemists pay for these."
            type: "Misc"
            value: 2
            quantity: 1
    items:
      - id: "aged_wine_bottle"
        name: "Aged Wine Bottle"
        description: "A dusty bottle of wine from a vintage that predates the tavern itself. Mara probably doesn't know it's down here."
        type: "Misc"
        value: 8
      - id: "rat_chewed_coin_pouch"
        name: "Rat-Chewed Coin Pouch"
        description: "A small leather pouch gnawed open by rats. A few tarnished coins still jingle inside."
        type: "Misc"
        value: 3
      - id: "rusty_key"
        name: "Rusty Key"
        description: "An old iron key coated in rust. It must open something, but what? The teeth are worn but still intact."
        type: "Misc"
        value: 5
    environment_tags: ["indoor", "dark", "damp", "cellar", "dangerous"]

  - id: "market_stalls"
    name: "Morning Market"
    description: >-
      A cluster of colorful canvas stalls and rickety wooden tables spread out
      in an open clearing northeast of the town square. Merchants hawk their wares
      with varying degrees of enthusiasm and honesty. The smell of fresh bread
      mingles with dried herbs, old leather, and something frying in a pan.
      A weathered old woman tends the largest stall with a knowing smile.
    exits:
      southwest: "town_square"
    npcs:
      - id: "merchant_bess"
        name: "Old Bess"
        personality: "A sharp-eyed old woman who has been selling produce and gossip at the morning market for decades. Knows everyone's business and isn't shy about sharing it — for a customer, anyway. Warm to those who buy, frosty to those who browse. Sells cheap food and cheaper advice."
        faction: "merchants_guild"
        knowledge_scopes: ["rumors", "town", "food", "gossip", "merchants_guild"]
        is_shopkeeper: true
        shop_inventory:
          - id: "fresh_bread"
            name: "Fresh Bread"
            description: "A warm loaf of crusty bread. Simple but satisfying."
            type: "Misc"
            value: 2
            is_consumable: true
            effect: "Restores 1 HP"
            quantity: 5
          - id: "meat_pie"
            name: "Meat Pie"
            description: "A flaky pastry filled with mystery meat and gravy. Don't ask what's in it."
            type: "Misc"
            value: 3
            is_consumable: true
            effect: "Restores 3 HP"
            quantity: 3
          - id: "dried_herbs"
            name: "Dried Herbs"
            description: "A bundle of dried herbs tied with twine. Useful for cooking or basic remedies."
            type: "Misc"
            value: 2
            quantity: 5
    items:
      - id: "bruised_apple"
        name: "Bruised Apple"
        description: "A red apple with a large brown bruise on one side. Fell off a cart, probably. Still edible."
        type: "Misc"
        value: 1
        is_consumable: true
      - id: "torn_silk_scarf"
        name: "Torn Silk Scarf"
        description: "A once-fine silk scarf with a tear along one edge. The colors are still vibrant — purple and gold."
        type: "Misc"
        value: 3
      - id: "cracked_mirror"
        name: "Cracked Mirror"
        description: "A small hand mirror with a crack running through the glass. Seven years of bad luck, or a handy signaling tool."
        type: "Misc"
        value: 2
    environment_tags: ["outdoor", "safe", "lit", "market", "busy"]

  - id: "town_well"
    name: "The Old Well"
    description: >-
      A weathered stone well tucked in a quiet corner southwest of the town square.
      The well is old — older than the town, some say. Its stones are covered in
      moss and faded carvings that nobody can read anymore. A frayed rope hangs
      over the edge into impenetrable darkness below. If you lean over and look
      down, you can't see the bottom. But you get the feeling something down
      there can see you.
    exits:
      northeast: "town_square"
    npcs:
      - id: "stray_cat_whiskers"
        name: "Whiskers"
        personality: "A scruffy orange tabby cat who has claimed the well as his personal territory. Supremely unbothered by everything. Will rub against your legs if you have food, ignore you completely if you don't. Occasionally stares into the well with an intensity that is deeply unsettling. Meows at inappropriate moments. Cannot be recruited, reasoned with, or impressed."
        faction: "neutral"
        knowledge_scopes: []
    items:
      - id: "mossy_coin"
        name: "Mossy Coin"
        description: "An old copper coin fished out of the well, covered in green moss. Might be lucky. Might be cursed."
        type: "Misc"
        value: 1
      - id: "frayed_rope"
        name: "Frayed Rope"
        description: "A short length of rope cut from the well's bucket line. Worn thin and fraying, but still has some use."
        type: "Misc"
        value: 2
    environment_tags: ["outdoor", "safe", "dim", "mysterious", "well"]

# ──────────────────────────────────────────────────────────
#  FOREST: THE WHISPERWOOD
# ──────────────────────────────────────────────────────────

  - id: "forest_edge"
    name: "Edge of the Whisperwood"
    description: >-
      The tree line hits you like a wall. Ancient oaks crowd together, their
      branches tangled overhead into a canopy that blocks most of the sky.
      The path splits — north toward strange lights between the trees, and
      east deeper into the forest where the fog thickens.
    exits:
      west: "town_gate"
      north: "fairy_grove"
      east: "deep_forest"
    npcs:
      - id: "ranger_thorne"
        name: "Thorne the Ranger"
        personality: "Quiet, weathered, and world-weary. A retired adventurer who patrols the forest edge to keep Thornwall safe. Respects nature and anyone who doesn't waste his time. Will warn about dangers ahead honestly."
        faction: "neutral"
        knowledge_scopes: ["whisperwood", "monsters", "dread_hollow", "survival", "herbs"]
    items:
      - id: "odd_mushroom"
        name: "Odd Mushroom"
        description: "A plump mushroom with a spotted purple cap. It smells earthy and slightly sweet. Probably safe to eat. Probably."
        type: "Misc"
        value: 2
        is_consumable: true
      - id: "bird_feather"
        name: "Bird Feather"
        description: "A long iridescent feather from some forest bird. It catches the light with flashes of blue and green."
        type: "Misc"
        value: 1
      - id: "smooth_river_stone"
        name: "Smooth River Stone"
        description: "A flat, perfectly smooth stone from a nearby stream. Ideal for skipping or throwing at things."
        type: "Misc"
        value: 1
    environment_tags: ["outdoor", "forest", "dim", "wilderness"]

  - id: "fairy_grove"
    name: "The Fairy Grove"
    description: >-
      A clearing where soft golden light filters through crystalline leaves.
      Tiny luminous shapes dart between mushroom rings, leaving trails of
      sparkling dust. It's beautiful and deeply unsettling. A massive ancient
      tree stands in the center, its trunk carved with faces that seem to watch you.
      A shimmering figure perches on a low branch, watching you with amused malice.
    exits:
      south: "forest_edge"
    npcs:
      - id: "fae_trickster"
        name: "Thornweave the Trickster"
        personality: "A mercurial fae spirit who guards the grove's treasures. Speaks in riddles and half-truths. Will not let anyone take items from the grove without first answering a riddle or besting them in a contest of wits (CHA or INT check). If insulted, becomes a dangerous opponent. If charmed, might offer a bonus item. Loves wordplay and despises boring people."
        faction: "neutral"
        knowledge_scopes: ["fae", "forest", "riddles", "ancient_secrets"]
        level: 4
        hp: 30
        max_hp: 30
        attack_bonus: 6
        damage_dice: "2d6+3"
        defense: 14
        loot:
          - id: "fae_dust"
            name: "Handful of Fae Dust"
            description: "Glittering motes of crystallized magic. Could be sold for a tidy sum, or used to enchant something."
            type: "Misc"
            value: 50
            quantity: 1
    items:
      - id: "fairy_crown"
        name: "Crown of the Fae"
        description: "A circlet woven from living silver vines. Whispers ancient secrets to its wearer. Dramatically boosts magical ability."
        type: "Helmet"
        armor_value: 2
        value: 600
        is_equippable: true
        effect: "+5 to INT and WIS while worn"
        stat_bonuses:
          int: 5
          wis: 5
      - id: "healing_mushroom"
        name: "Glowcap Mushroom"
        description: "A luminous mushroom that pulses with warm light. Eating it restores health and cures poison."
        type: "Potion"
        value: 25
        is_consumable: true
        effect: "Restores 20 HP and cures poison"
        quantity: 3
    environment_tags: ["outdoor", "forest", "magical", "lit", "fae"]

  - id: "deep_forest"
    name: "The Tangled Deep"
    description: >-
      The fog is so thick you can barely see your own hands. Roots snake across
      the ground like tripwires, and every sound is swallowed by the damp
      stillness. Something large crashed through here recently — broken branches
      and deep gouges mark the trail heading south toward crumbling stone ruins.
    exits:
      west: "forest_edge"
      south: "dungeon_entrance"
    npcs:
      - id: "wolf_alpha"
        name: "Shadowfang"
        personality: "A massive dire wolf with glowing amber eyes. Territorial and aggressive. Will attack on sight unless the player shows dominance or offers food."
        faction: "neutral"
        knowledge_scopes: []
        is_hostile: true
        level: 3
        hp: 30
        max_hp: 30
        attack_bonus: 4
        damage_dice: "1d6+2"
        defense: 12
        loot:
          - id: "wolf_pelt"
            name: "Shadowfang Pelt"
            description: "A thick, dark pelt that radiates warmth. Worth a fortune to the right buyer."
            type: "Misc"
            value: 150
            quantity: 1
    environment_tags: ["outdoor", "forest", "dark", "fog", "dangerous"]

# ──────────────────────────────────────────────────────────
#  DUNGEON: THE DREAD HOLLOW
# ──────────────────────────────────────────────────────────

  - id: "dungeon_entrance"
    name: "Dread Hollow Entrance"
    description: >-
      Crumbling stone archways frame a yawning darkness that descends into the
      earth. The air smells of rot and old blood. Carved into the lintel above
      the entrance is a crude image of a tusked beast. Someone has scratched
      "TURN BACK" into the stone in shaky letters. The path continues down.
    exits:
      north: "deep_forest"
      down: "dungeon_hall"
    items:
      - id: "crumbling_brick"
        name: "Crumbling Brick"
        description: "A chunk of ancient masonry that broke free from the archway. Covered in a thin layer of dried blood."
        type: "Misc"
        value: 1
      - id: "faded_map_fragment"
        name: "Faded Map Fragment"
        description: "A torn piece of parchment showing what might be a rough layout of tunnels below. Most of the ink has faded, but a few passages are still visible."
        type: "Misc"
        value: 5
      - id: "adventurer_journal"
        name: "Adventurer's Journal"
        description: "A water-stained journal from a previous explorer. The last entry reads: 'The cultists worship something in the deep. If you fight the priestess, destroy the staff first — it heals the beast.' The rest is unreadable."
        type: "Misc"
        value: 3
    environment_tags: ["outdoor", "ruins", "dark", "dangerous", "dungeon_entrance"]

  - id: "dungeon_hall"
    name: "The Hollow Hall"
    description: >-
      A long underground corridor lined with crumbling pillars. Torches flicker
      in rusty sconces — someone has been maintaining them. Bones crunch
      underfoot. The hall branches east toward the sound of chanting, and a
      heavy iron door blocks the passage deeper down.
    exits:
      up: "dungeon_entrance"
      east: "cultist_shrine"
      down: "dungeon_depths"
    npcs:
      - id: "skeleton_guard_1"
        name: "Hollow Skeleton"
        personality: "An animated skeleton in rusted armor. Mindless but relentless. Attacks any living creature on sight. Its empty eye sockets glow with a faint crimson light."
        faction: "hollow_cult"
        knowledge_scopes: []
        is_hostile: true
        level: 3
        hp: 22
        max_hp: 22
        attack_bonus: 4
        damage_dice: "1d6+1"
        defense: 12
        loot:
          - id: "rusted_sword"
            name: "Rusted Longsword"
            description: "Pitted and dull, but still capable of drawing blood."
            type: "Weapon"
            damage_dice: "1d8"
            damage_stat: "str"
            value: 10
            is_equippable: true
    items:
      - id: "old_shield"
        name: "Battered Iron Shield"
        description: "Dented and scarred from countless battles. Still holds together. Barely."
        type: "Shield"
        armor_value: 2
        value: 15
        is_equippable: true
    environment_tags: ["indoor", "underground", "dark", "dungeon", "dangerous"]

  - id: "cultist_shrine"
    name: "Shrine of the Tusk"
    description: >-
      A circular chamber dominated by a crude stone altar stained dark with
      old blood. Candles flicker around a massive boar skull mounted on the
      wall. Hooded figures kneel in prayer, murmuring in a language that makes
      your teeth hurt. They haven't noticed you. Yet.
    exits:
      west: "dungeon_hall"
    npcs:
      - id: "cultist_leader"
        name: "High Acolyte Vex"
        personality: "Fanatical, unhinged, and dangerously intelligent. Leads the Hollow Cult's rituals. Believes Goretusk is a god. Will try to convert the player before attacking. Immune to intimidation — she genuinely welcomes death."
        faction: "hollow_cult"
        knowledge_scopes: ["hollow_cult", "goretusk", "rituals", "dread_hollow"]
        is_hostile: true
        level: 3
        hp: 22
        max_hp: 22
        attack_bonus: 3
        damage_dice: "1d6+1"
        defense: 12
        loot:
          - id: "acolyte_staff"
            name: "Staff of Dark Whispers"
            description: "A gnarled staff that hums with malevolent energy. Boosts magic damage significantly."
            type: "Weapon"
            damage_dice: "3d6+4"
            damage_stat: "int"
            value: 400
            is_equippable: true
      - id: "cultist_grunt"
        name: "Hollow Cultist"
        personality: "A brainwashed follower. Fearful of Vex, more fearful of Goretusk. Will flee if Vex is defeated."
        faction: "hollow_cult"
        knowledge_scopes: ["hollow_cult"]
        is_hostile: true
        level: 2
        hp: 15
        max_hp: 15
        attack_bonus: 2
        damage_dice: "1d6+1"
        defense: 11
    items:
      - id: "cult_treasure"
        name: "Offering Chest"
        description: "A chest filled with gold coins and trinkets offered to Goretusk. The cultists won't miss it. Probably."
        type: "Misc"
        value: 200
    environment_tags: ["indoor", "underground", "dark", "shrine", "dangerous", "cultist"]

  - id: "dungeon_depths"
    name: "The Dread Depths"
    description: >-
      The deepest chamber of the Dread Hollow. The ceiling soars into darkness
      above. The floor is cracked and scorched. In the center of the room,
      chained to a massive stone pillar, is a creature from nightmares —
      Goretusk the Undying. A monstrous boar-demon the size of a wagon,
      with tusks like scimitars and eyes that burn with hellfire. The chains
      are cracking. It sees you. It smiles.
    exits:
      up: "dungeon_hall"
    npcs:
      - id: "boss_goretusk"
        name: "Goretusk the Undying"
        personality: "Ancient, malevolent, and theatrical. A demon-boar bound beneath the Dread Hollow for centuries. Loves to monologue before killing. Respects nothing. Cannot be reasoned with — only destroyed. VICTORY CONDITION: defeating this creature wins the demo."
        faction: "hollow_cult"
        knowledge_scopes: ["dread_hollow", "ancient_evil", "hollow_cult"]
        is_hostile: true
        level: 6
        hp: 55
        max_hp: 55
        attack_bonus: 5
        damage_dice: "1d8+2"
        defense: 12
        loot:
          - id: "goretusk_tusk"
            name: "Tusk of the Undying"
            description: "A massive curved tusk torn from Goretusk's skull. It pulses with dark power. Proof that you actually did it."
            type: "QuestItem"
            value: 1000
          - id: "champion_blade"
            name: "Demonslayer Greatsword"
            description: "A legendary weapon forged in Goretusk's own hellfire. Absurdly powerful. You earned this."
            type: "Weapon"
            damage_dice: "4d8+8"
            damage_stat: "str"
            value: 2000
            is_equippable: true
            is_two_handed: true
            stat_bonuses:
              str: 3
              con: 2
    environment_tags: ["indoor", "underground", "dark", "boss_arena", "hellfire", "dangerous"]
